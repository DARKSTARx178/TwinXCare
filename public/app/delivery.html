<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Deliveries & History</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .search-box {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 54px;
            border-radius: 18px;
            background: #E2E8F0;
            margin-bottom: 14px;
        }

        .search-input {
            flex: 1;
            margin-left: 12px;
            border: none;
            outline: none;
            background: transparent;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            font-family: inherit;
        }

        .search-filter-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1.5px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            cursor: pointer;
        }

        .filter-menu {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px;
            margin-bottom: 14px;
            background: var(--surface);
        }

        .filter-option {
            width: 100%;
            border: none;
            background: transparent;
            text-align: left;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
        }

        .filter-option.active {
            background: var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="top-header">
        <a href="/app/profile.html" class="profile-trigger">
            <i class="mdi mdi-account-circle-outline"></i>
        </a>
    </div>

    <main class="fade-in" style="padding-top: 60px; padding-bottom: 100px;">
        <div style="margin-bottom: 20px;">
            <div style="font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; color: var(--text);">History</div>
            <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-dim); margin-top: 4px; margin-bottom: 24px;">
                Equipment delivery status
            </div>
            <div class="search-box">
                <i class="mdi mdi-magnify" style="color: var(--text-dim); font-size: 20px;"></i>
                <input id="search-input" class="search-input" placeholder="Search orders, bookings, reference..." />
                <button id="filter-btn" class="search-filter-btn" aria-label="Filter">
                    <i class="mdi mdi-tune" style="font-size: 20px;"></i>
                </button>
            </div>
            <div id="filter-menu" class="filter-menu" style="display:none;"></div>

            <div id="result-count" style="margin-bottom: 12px; color: var(--text-dim); font-size: 0.8rem; font-weight: 700;">
                0 active items
            </div>
        </div>

        <div id="history-grid" style="margin-bottom: 40px;">
            <div style="text-align: center; color: var(--text-dim); padding: 20px;">
                Checking history...
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="/app/index.html" class="nav-item">
                <i class="mdi mdi-home"></i>
                <span>Home</span>
            </a>
            <a href="/app/explore.html" class="nav-item">
                <i class="mdi mdi-compass-outline"></i>
                <span>Equipment</span>
            </a>
            <a href="/app/escorts.html" class="nav-item">
                <i class="mdi mdi-shield-account-outline"></i>
                <span>Escorts</span>
            </a>
            <a href="/app/delivery.html" class="nav-item active">
                <i class="mdi mdi-truck-delivery-outline"></i>
                <span>History</span>
            </a>
            <a href="/app/settings.html" class="nav-item">
                <i class="mdi mdi-cog-outline"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { auth, db, doc, getDoc, onAuthStateChanged } from '/app/firebase.js';
        import { Analytics } from "@vercel/analytics/next"

        const grid = document.getElementById('history-grid');
        const searchInput = document.getElementById('search-input');
        const filterBtn = document.getElementById('filter-btn');
        const filterMenu = document.getElementById('filter-menu');
        const resultCount = document.getElementById('result-count');
        let allEntries = [];
        let activeFilter = 'all';

        function renderFilterMenu() {
            const options = [
                { label: 'All Active', value: 'all' },
                { label: 'Orders', value: 'orders' },
                { label: 'Bookings', value: 'bookings' },
                { label: 'Processing', value: 'processing' },
                { label: 'Pending', value: 'pending' },
                { label: 'Confirmed', value: 'confirmed' },
            ];
            filterMenu.innerHTML = options.map(o =>
                `<button class="filter-option ${activeFilter === o.value ? 'active' : ''}" data-filter="${o.value}">${o.label}</button>`
            ).join('');
            filterMenu.querySelectorAll('.filter-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeFilter = btn.getAttribute('data-filter');
                    filterMenu.style.display = 'none';
                    renderEntries();
                });
            });
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString();
        }

        function getStatusClass(status) {
            const normalized = String(status || '').toLowerCase();
            if (normalized.includes('processing') || normalized.includes('pending')) return 'status-pending';
            if (normalized.includes('confirmed')) return 'status-confirmed';
            return 'status-delivered';
        }

        function renderEntries() {
            const q = searchInput.value.trim().toLowerCase();
            const visible = allEntries
                .filter((entry) => {
                    const status = String(entry.status || '').toLowerCase();
                    return !(status.includes('completed') || status.includes('delivered'));
                })
                .filter((entry) => {
                    if (activeFilter === 'orders') return entry.type === 'order';
                    if (activeFilter === 'bookings') return entry.type === 'booking';
                    const status = String(entry.status || '').toLowerCase();
                    if (activeFilter === 'processing') return status.includes('processing');
                    if (activeFilter === 'pending') return status.includes('pending');
                    if (activeFilter === 'confirmed') return status.includes('confirmed');
                    return true;
                })
                .filter((entry) => {
                    if (!q) return true;
                    const ref = String(entry.transactionId || '');
                    const name = entry.type === 'order' ? String(entry.name || '') : String(entry.title || '');
                    const details = entry.type === 'order'
                        ? String(entry.deliveryAddress || '')
                        : `${entry.timeSlot || ''} ${entry.description || ''}`;
                    return `${name} ${ref} ${details}`.toLowerCase().includes(q);
                });

            resultCount.innerText = `${visible.length} active items`;

            if (visible.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-dim);">No active deliveries for current search/filter.</div>';
                return;
            }

            grid.innerHTML = visible.map(entry => {
                const isOrder = entry.type === 'order';
                const name = isOrder ? `${entry.name} (x${entry.quantity})` : entry.title;
                const date = isOrder ? formatDate(entry.orderTime) : formatDate(entry.bookingDate);
                const statusClass = getStatusClass(entry.status || 'Confirmed');

                return `
                <div class="item-card" style="padding: 16px; margin-bottom: 12px; height: auto;">
                    <div style="width: 100%;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <div style="font-weight: 700; font-size: 1.1rem; flex: 1; padding-right: 10px;">${name}</div>
                            <div class="status-badge ${statusClass}">${entry.status || 'Confirmed'}</div>
                        </div>
                        <div style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 8px;">
                            Ref: ${entry.transactionId || 'Prepaid/Included'}
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
                            <i class="mdi mdi-calendar" style="color: var(--primary);"></i>
                            <span>${date}</span>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        searchInput.addEventListener('input', renderEntries);
        filterBtn.addEventListener('click', () => {
            if (filterMenu.style.display === 'none') {
                renderFilterMenu();
                filterMenu.style.display = 'block';
            } else {
                filterMenu.style.display = 'none';
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-dim);">Please <a href="/login">login</a> to view your rentals and history.</div>';
                return;
            }

            try {
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const data = userSnap.data();
                    const history = data.history || [];
                    const bookings = data.booking || [];

                    allEntries = [
                        ...history.map(h => ({ ...h, type: 'order' })),
                        ...bookings.map(b => ({ ...b, type: 'booking' }))
                    ];

                    allEntries.sort((a, b) => {
                        const dateA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                        const dateB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                        return dateB - dateA;
                    });

                    if (allEntries.length === 0) {
                        grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-dim);">No active orders or bookings found.</div>';
                        resultCount.innerText = '0 active items';
                        return;
                    }

                    renderEntries();

                } else {
                    grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-dim);">No user record found.</div>';
                }
            } catch (e) {
                console.error(e);
                grid.innerHTML = '<div style="color:red; padding: 20px;">Error loading history</div>';
            }
        });

    </script>
</body>

</html>
