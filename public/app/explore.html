<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Explore</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
</head>

<body>

    <main class="fade-in">
        <div class="section-title">
            <i class="mdi mdi-compass" style="color: var(--primary);"></i>
            Explore Equipment
        </div>

        <input type="text" class="search-bar" id="search-input" placeholder="Search equipment...">

        <!-- Equipment List Container -->
        <div class="items-grid" id="equipment-grid">
            <div style="text-align: center; color: var(--text-dim); padding: 20px; width: 100%;">
                Loading equipment...
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="/app/index.html" class="nav-item">
                <i class="mdi mdi-home"></i>
                <span>Home</span>
            </a>
            <a href="/app/explore.html" class="nav-item active">
                <i class="mdi mdi-compass"></i>
                <span>Explore</span>
            </a>
            <a href="/app/services.html" class="nav-item">
                <i class="mdi mdi-car-sports"></i>
                <span>Services</span>
            </a>
            <a href="/app/delivery.html" class="nav-item">
                <i class="mdi mdi-truck-delivery"></i>
                <span>History</span>
            </a>
            <a href="/app/settings.html" class="nav-item">
                <i class="mdi mdi-cog"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { db, collection, getDocs, convertGoogleDriveLink } from '/app/firebase.js';

        let equipmentData = [];
        const grid = document.getElementById('equipment-grid');
        const searchInput = document.getElementById('search-input');

        async function loadEquipment() {
            try {
                const querySnapshot = await getDocs(collection(db, 'equipment'));
                equipmentData = querySnapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        id: doc.id,
                        name: data.name || 'Unnamed Gear',
                        brand: data.brand || 'Premium',
                        price: data.price || 0,
                        stock: data.stock || 0,
                        image: convertGoogleDriveLink(data.image)
                    };
                });
                renderEquipment(equipmentData);
            } catch (e) {
                console.error("Error loading equipment:", e);
                grid.innerHTML = '<div style="color:red; margin:20px;">Failed to load equipment</div>';
            }
        }

        function renderEquipment(items) {
            if (items.length === 0) {
                grid.innerHTML = '<div style="width:100%; text-align:center; padding:40px; color:var(--text-dim);">No items match your search.</div>';
                return;
            }

            grid.innerHTML = items.map(item => `
        <div class="item-card">
          <img src="${item.image}" alt="${item.name}" class="item-img" onerror="this.src='https://via.placeholder.com/120?text=No+Img'">
          <div class="item-info">
            <div class="item-brand">${item.brand}</div>
            <div class="item-title">${item.name}</div>
            <div class="item-bottom">
              <div class="item-price">$${item.price}</div>
              <div class="stock-badge">${item.stock} in Stock</div>
            </div>
          </div>
        </div>
      `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = equipmentData.filter(item =>
                item.name.toLowerCase().includes(val) ||
                item.brand.toLowerCase().includes(val)
            );
            renderEquipment(filtered);
        });

        loadEquipment();
    </script>
</body>

</html>
