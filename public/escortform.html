<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwinXCare - Escort Portal</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Premium Dark Theme - Restored Style */
            --bg-base: #F8FAFC;
            --bg-card: #FFFFFF;
            --primary: #81ade7;
            --primary-glow: rgba(129, 173, 231, 0.4);
            --text-main: #1E293B;
            --text-dim: #64748B;
            --accent: #62b8ea;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: rgba(0, 0, 0, 0.05);
            --glass: #FFFFFF;
            --surface-hover: #F1F5F9;
            --indigo-600: #818cf8;
            --rose-600: #fb7185;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            background-image: radial-gradient(at 0% 0%, rgba(129, 173, 231, 0.08) 0px, transparent 45%), radial-gradient(at 100% 100%, rgba(98, 184, 234, 0.08) 0px, transparent 45%);
        }

        /* Glass Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-base);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Navigation */
        nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            /* background: linear-gradient(135deg, var(--primary), var(--accent)); */
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logout-btn {
            background: var(--surface-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logout-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }



        /* Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2.5rem;
        }

        @media (max-width: 1100px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Columns */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .data-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Section Containers */
        .glass-box {
            background: var(--glass);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .box-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .box-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Styling */
        .form-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.6rem;
        }

        .input-dark {
            width: 100%;
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-dark:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .btn-premium {
            width: 100%;
            padding: 1rem;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-indigo-outline {
            border-color: var(--indigo-600);
            color: var(--indigo-600);
            background: transparent;
        }

        .btn-indigo-outline:hover {
            background: var(--indigo-600);
            color: var(--text-main);
        }

        .btn-rose-outline {
            border-color: var(--rose-600);
            color: var(--rose-600);
            background: transparent;
        }

        .btn-rose-outline:hover {
            background: var(--rose-600);
            color: var(--text-main);
        }

        /* Card Listings - PREMIUM GRID */
        .entry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
        }

        .entry-card {
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.25rem;
            transition: all 0.3s;
        }

        .entry-card:hover {
            border-color: var(--primary);
            background: #F1F5F9;
            transform: translateY(-3px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #323945, #1a1d23);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border: 1px solid var(--border);
        }

        .card-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
        }

        .card-sub {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .badge-glass {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            backdrop-filter: blur(5px);
        }

        .badge-available,
        .badge-pending {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-matched {
            color: var(--warning);
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-confirmed {
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-completed {
            color: var(--text-dim);
            background: var(--surface-hover);
            border: 1px solid var(--border);
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.25rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .detail-item i {
            width: 16px;
            color: var(--primary);
        }

        .card-actions {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            display: flex;
            justify-content: flex-end;
        }

        .btn-sm {
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid var(--primary);
            background: transparent;
            color: var(--primary);
            transition: all 0.2s;
        }

        .btn-sm:hover {
            background: var(--primary);
            color: #FFFFFF;
        }

        /* Auth Screen */
        #auth-view {
            display: flex;
            min-height: 85vh;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 4rem;
            border-radius: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
        }

        /* Utility */
        #dashboard-view {
            display: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1.5rem; color: var(--text-dim); font-weight: 600;">Connecting to Care Portal...</p>
    </div>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <img src="./assets/images/logo_all-white.png" alt="TwinXCare Logo">
            </div>
            <h1>TwinXCare</h1>
        </a>
        <div class="nav-actions">
            <span id="offline-label" class="badge-glass badge-pending hidden">
                <i class="fas fa-wifi-slash"></i> Offline Sync
            </span>
            <button class="logout-btn hidden" id="logout-btn">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- Auth View -->
        <section id="auth-view">
            <div class="login-card">
                <i class="fas fa-user-circle" style="font-size: 3rem; color: var(--primary); margin-bottom: 2rem;"></i>
                <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 1rem;">Escort Portal</h2>
                <p style="color: var(--text-dim); margin-bottom: 3rem;">Sign in to manage your care requests and
                    availability.</p>
                <form id="login-form">
                    <div class="form-group" style="text-align: left;">
                        <label>Email Address</label>
                        <input type="email" id="login-email" class="input-dark" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label>Password</label>
                        <input type="password" id="login-pass" class="input-dark" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-premium"
                        style="background: var(--primary); color: #FFFFFF; margin-top: 1.5rem;">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
            </div>
        </section>

        <!-- Dashboard View -->
        <section id="dashboard-view">
            <!-- Information Banner -->
            <div class="glass-box"
                style="padding: 1.25rem; margin-bottom: 2rem; border-color: var(--primary); background: rgba(129, 173, 231, 0.05); text-align: center;">
                <p style="font-weight: 600; color: var(--primary); font-size: 0.95rem;">
                    <i class="fas fa-bell" style="margin-right: 10px;"></i>
                    You will be notified of details by the <strong>TwinXCare App</strong> when a successful match is
                    found.
                </p>
            </div>



            <div class="dashboard-grid">
                <!-- Sidebar Controls -->
                <div class="control-panel">
                    <div class="glass-box" id="vol-form-container" style="display: none;">
                        <div class="box-header" style="background: rgba(129, 140, 248, 0.05);">
                            <h2><i class="fas fa-plus-circle" style="color: var(--indigo-600);"></i> Register
                                Availability</h2>
                        </div>
                        <div class="form-body">
                            <form id="vol-form">
                                <div class="form-group"
                                    style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                    <div>
                                        <label>Escort Date</label>
                                        <input type="date" class="input-dark" id="vol-date" required>
                                    </div>
                                    <div>
                                        <label>Window</label>
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <input type="time" class="input-dark" id="vol-start"
                                                style="flex: 1; min-width: 0;" required>
                                            <input type="time" class="input-dark" id="vol-end"
                                                style="flex: 1; min-width: 0;" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Preferred Location</label>
                                    <input type="text" class="input-dark" id="vol-location"
                                        placeholder="Hospital, area, or facility" required>
                                </div>
                                <div class="form-group"
                                    style="display: grid; grid-template-columns: 1fr 2fr; gap: 12px;">
                                    <div>
                                        <label>Capacity</label>
                                        <input type="number" class="input-dark" id="vol-pax" placeholder="1" value="1">
                                    </div>
                                    <div>
                                        <label>Contact Phone</label>
                                        <input type="tel" class="input-dark" id="vol-phone"
                                            placeholder="Your active number">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Additional Notes</label>
                                    <textarea class="input-dark" id="vol-notes" style="height: 80px; resize: none;"
                                        placeholder="Constraints or references..."></textarea>
                                </div>
                                <button type="submit" class="btn-premium btn-indigo-outline">Register
                                    Availability</button>
                            </form>
                        </div>
                    </div>

                    <div class="glass-box" id="req-form-container" style="display: none;">
                        <div class="box-header" style="background: rgba(251, 113, 133, 0.05);">
                            <h2><i class="fas fa-heart" style="color: var(--rose-600);"></i> Request Escort</h2>
                        </div>
                        <div class="form-body">
                            <form id="req-form">
                                <div class="form-group"
                                    style="display: grid; grid-template-columns: 1fr 2fr; gap: 12px;">
                                    <div>
                                        <label>Date</label>
                                        <input type="date" class="input-dark" id="req-date" required>
                                    </div>
                                    <div>
                                        <label>Time Window</label>
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <input type="time" class="input-dark" id="req-start"
                                                style="flex: 1; min-width: 0;" required>
                                            <input type="time" class="input-dark" id="req-end"
                                                style="flex: 1; min-width: 0;" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Hospital / Clinic</label>
                                    <input type="text" class="input-dark" id="req-hospital"
                                        placeholder="Name of health facility" required>
                                </div>
                                <div class="form-group">
                                    <label>Reason for Appointment</label>
                                    <input type="text" class="input-dark" id="req-reason"
                                        placeholder="e.g. Regular checkup, Dialysis" required>
                                </div>
                                <div class="form-group"
                                    style="display: grid; grid-template-columns: 1fr 2fr; gap: 12px;">
                                    <div>
                                        <label>Patient Age</label>
                                        <input type="number" class="input-dark" id="req-age" placeholder="70">
                                    </div>
                                    <div>
                                        <label>Contact Phone</label>
                                        <input type="tel" class="input-dark" id="req-phone" placeholder="Mobile number">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Medical Details</label>
                                    <textarea class="input-dark" id="req-medical" style="height: 60px; resize: none;"
                                        placeholder="Mobility constraints, medications..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Additional Instructions</label>
                                    <textarea class="input-dark" id="req-notes" style="height: 60px; resize: none;"
                                        placeholder="Any specific needs?"></textarea>
                                </div>
                                <button type="submit" class="btn-premium btn-rose-outline">Submit Request</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Data Feeds -->
                <div class="data-panel">
                    <div class="glass-box" id="vol-data-container" style="display: none;">
                        <div class="box-header">
                            <h2><i class="fas fa-user-check"></i> My Availability Shifts</h2>
                        </div>
                        <div id="vol-grid" class="entry-grid">
                            <!-- User's availability entries will load here -->
                        </div>
                    </div>

                    <div class="glass-box" id="req-data-container" style="display: none;">
                        <div class="box-header">
                            <h2><i class="fas fa-clipboard-list"></i> My Care Requests</h2>
                        </div>
                        <div id="req-grid" class="entry-grid">
                            <!-- User's care requests will load here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, where, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfigResponse = await fetch('/api/firebase-config');
        if (!firebaseConfigResponse.ok) {
            throw new Error('Firebase client config is missing.');
        }

        const firebaseConfig = await firebaseConfigResponse.json();

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // SYSTEM STATE
        let myVolunteers = [];
        let myRequests = [];

        const loader = document.getElementById('loader');
        const authView = document.getElementById('auth-view');
        const dashboardView = document.getElementById('dashboard-view');
        const logoutBtn = document.getElementById('logout-btn');

        // INITIALIZATION
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userSnap = await getDoc(doc(db, 'users', user.uid));
                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        const isEscort = userData.userType === 'escort' || userData.role === 'admin';
                        const isPatient = userData.userType === 'standard' || userData.role === 'admin';

                        document.getElementById('vol-form-container').style.display = isEscort ? 'block' : 'none';
                        document.getElementById('vol-data-container').style.display = isEscort ? 'block' : 'none';
                        document.getElementById('req-form-container').style.display = isPatient ? 'block' : 'none';
                        document.getElementById('req-data-container').style.display = isPatient ? 'block' : 'none';
                    }

                    dashboardView.style.display = 'block';
                    authView.style.display = 'none';
                    logoutBtn.classList.remove('hidden');
                    syncUserData(user.uid);
                } catch (err) {
                    console.error("User profile fetch error:", err);
                }
            } else {
                dashboardView.style.display = 'none';
                authView.style.display = 'flex';
                logoutBtn.classList.add('hidden');
            }
            hideLoader();
        });

        // AUTH HANDLERS
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
            } catch (err) { alert(err.message); }
        };
        logoutBtn.onclick = () => signOut(auth);

        // DATA SYNC
        function syncUserData(uid) {
            // Only fetch entries owned by this user
            const volQuery = query(collection(db, 'escort', 'availability', 'entries'), where("providerId", "==", uid));
            const reqQuery = query(collection(db, 'escort', 'request', 'entries'), where("userId", "==", uid));

            onSnapshot(volQuery, (snap) => {
                myVolunteers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderEntries();
            });
            onSnapshot(reqQuery, (snap) => {
                myRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderEntries();
            });
        }

        // ENTRY SUBMISSIONS
        document.getElementById('vol-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            const data = {
                providerId: auth.currentUser.uid,
                providerEmail: auth.currentUser.email,
                date: document.getElementById('vol-date').value,
                fromTime: document.getElementById('vol-start').value,
                toTime: document.getElementById('vol-end').value,
                location: document.getElementById('vol-location').value,
                maxPax: Number(document.getElementById('vol-pax').value) || 1,
                contactPhone: document.getElementById('vol-phone').value,
                notes: document.getElementById('vol-notes').value,
                createdAt: new Date().toISOString(),
                status: 'available',
                patientConfirmed: false,
                volunteerConfirmed: false,
                patientCompleted: false,
                volunteerCompleted: false
            };
            await addDoc(collection(db, 'escort', 'availability', 'entries'), data);
            e.target.reset();
        };

        document.getElementById('req-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            const data = {
                userId: auth.currentUser.uid,
                userEmail: auth.currentUser.email,
                date: document.getElementById('req-date').value,
                time: document.getElementById('req-start').value,
                endTime: document.getElementById('req-end').value,
                hospital: document.getElementById('req-hospital').value,
                appointmentReason: document.getElementById('req-reason').value,
                age: Number(document.getElementById('req-age').value) || null,
                contactPhone: document.getElementById('req-phone').value,
                medicalDetails: document.getElementById('req-medical').value,
                additionalNotes: document.getElementById('req-notes').value,
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            await addDoc(collection(db, 'escort', 'request', 'entries'), data);
            e.target.reset();
        };

        // RENDERING LOGIC
        function renderEntries() {

            renderVolunteers();
            renderRequests();
        }



        function renderVolunteers() {
            const grid = document.getElementById('vol-grid');
            const sorted = myVolunteers.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            grid.innerHTML = sorted.map(v => {
                const isMatched = v.status === 'matched';
                return `
                    <div class="entry-card">
                        <div class="card-top">
                            <div class="card-user">
                                <div class="avatar-circle">V</div>
                                <div>
                                    <div class="card-name">My Assignment</div>
                                    <div class="card-sub">${isMatched ? 'Matched with Client' : 'Waiting for Match'}</div>
                                    <div style="font-size: 0.65rem; color: var(--text-dim); margin-top:2px;">ID: ${v.id}</div> 
                                </div>
                            </div>
                            <span class="badge-glass badge-${v.status}">${v.status}</span>
                        </div>
                        <div class="card-details">
                            <div class="detail-item"><i class="fas fa-calendar"></i> ${formatDate(v.date)}</div>
                            <div class="detail-item"><i class="fas fa-clock"></i> ${v.fromTime} - ${v.toTime}</div>
                            <div class="detail-item"><i class="fas fa-map-marker-alt"></i> ${v.location || 'Anywhere'} (Max ${v.maxPax || 1} Pax)</div>
                            <div class="detail-item" style="font-style: italic; opacity: 0.7;"><i class="fas fa-quote-left"></i> ${v.notes || 'No notes'}</div>
                        </div>
                        <div class="card-actions">
                             <button class="btn-sm" style="border-color:var(--danger); color:var(--danger)" onclick="deleteEntry('availability', '${v.id}')">Remove</button>
                        </div>
                    </div>
                `;
            }).join('') || '<div style="padding: 2rem; color: var(--text-dim);">You have no availability shifts logged.</div>';
        }

        function renderRequests() {
            const grid = document.getElementById('req-grid');
            const sorted = myRequests.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            grid.innerHTML = sorted.map(r => {
                const isMatched = r.status === 'matched';
                const isDone = r.status === 'completed';

                return `
                    <div class="entry-card" style="${isDone ? 'opacity: 0.6' : ''}">
                        <div class="card-top">
                            <div class="card-user">
                                <div class="avatar-circle" style="color: var(--rose-600);"><i class="fas fa-heart"></i></div>
                                <div>
                                    <div class="card-name">Medical Request</div>
                                    <div class="card-sub">${r.hospital || 'Hospital'} • ${r.appointmentReason || 'Appointment'}</div>
                                    <div style="font-size: 0.65rem; color: var(--text-dim); margin-top:2px;">ID: ${r.id}</div>
                                </div>
                            </div>
                            <span class="badge-glass badge-${r.status}">${r.status}</span>
                        </div>
                        <div class="card-details">
                            <div class="detail-item"><i class="fas fa-calendar-day"></i> ${formatDate(r.date)}</div>
                            <div class="detail-item"><i class="fas fa-clock"></i> ${r.time} - ${r.endTime}</div>
                            ${r.age ? `<div class="detail-item"><i class="fas fa-user"></i> Patient Age: ${r.age}</div>` : ''}
                            ${r.medicalDetails ? `<div class="detail-item"><i class="fas fa-notes-medical"></i> Details: ${r.medicalDetails}</div>` : ''}
                             <div class="detail-item" style="font-style: italic; opacity: 0.7;"><i class="fas fa-quote-left"></i> ${r.additionalNotes || r.notes || 'No instructions'}</div>
                            ${isMatched ? `<div class="detail-item" style="color:var(--success)"><i class="fas fa-user-check"></i> Matched with: ${r.matchedProviderName || 'Assigned Companion'}</div>` : ''}
                        </div>
                        <div class="card-actions">
                             <button class="btn-sm" style="border-color:var(--danger); color:var(--danger)" onclick="deleteEntry('request', '${r.id}')">Remove</button>
                        </div>
                    </div>
                `;
            }).join('') || '<div style="padding: 2rem; color: var(--text-dim);">No personal care requests found.</div>';
        }

        // UTILS
        window.deleteEntry = async (type, id) => {
            if (confirm('Permanently remove this entry?')) {
                const path = type === 'availability' ? 'escort/availability/entries' : 'escort/request/entries';
                await deleteDoc(doc(db, path, id));
            }
        };

        function formatDate(s) {
            const d = new Date(s);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function hideLoader() {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.visibility = 'hidden', 500);
        }

    </script>
</body>

</html>
