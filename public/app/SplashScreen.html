<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SplashScreen — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<main class="container" style="padding:3rem 1rem;text-align:center;">
  <div style="max-width:720px;margin:0 auto;">
    <div style="width:100%;display:flex;justify-content:center;margin-bottom:18px;">
      <div style="width:100px;height:100px;border-radius:34px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;">
        <img src="../assets/images/logo_all-white.png" alt="Logo" style="width:60px;height:60px;object-fit:contain;filter:grayscale(1) brightness(0) invert(1)">
      </div>
    </div>
    <h2 style="margin-bottom:6px">TwinXCare</h2>
    <p style="color:var(--text-dim)">Authenticating secure session...</p>

    <div style="display:flex;justify-content:center;margin-top:18px;">
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="dot" style="width:10px;height:10px;background:var(--primary);border-radius:50%;opacity:0.6"></div>
        <div class="dot" style="width:10px;height:10px;background:var(--primary);border-radius:50%;opacity:0.4"></div>
        <div class="dot" style="width:10px;height:10px;background:var(--primary);border-radius:50%;opacity:0.2"></div>
      </div>
    </div>

    <p style="text-align:center;margin-top:18px"><a href="index.html" class="btn-app">Back</a></p>
  </div>
</main>

<style>
  .dot{animation:pulse 1.4s infinite}
  @keyframes pulse{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
</style>
</body>
</html>
