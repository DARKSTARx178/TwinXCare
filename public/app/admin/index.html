<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Admin Dashboard</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .admin-header {
            margin-top: 40px;
            margin-bottom: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--primary-glow);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 40px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .admin-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: var(--transition);
            text-decoration: none;
            color: var(--text);
            cursor: pointer;
        }

        .admin-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
        }

        .admin-card-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
            font-size: 28px;
        }

        .admin-card-title {
            font-weight: 700;
            font-size: 0.95rem;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .info-box {
            background: rgba(129, 173, 231, 0.05);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .info-box i {
            color: var(--primary);
            font-size: 24px;
        }

        .info-text {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.5;
        }

        .back-btn {
            position: absolute;
            top: 25px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            text-decoration: none;
            font-size: 20px;
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--surface-hover);
            transform: scale(1.05);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <a href="../../app/profile.html" class="back-btn">
        <i class="mdi mdi-arrow-left"></i>
    </a>

    <main class="fade-in">
        <div class="admin-header">
            <div class="icon-circle">
                <i class="mdi mdi-shield-check"></i>
            </div>
            <h1>Control Center</h1>
            <p>Administrative Oversight & Management</p>
        </div>

        <div class="admin-grid">
            <a href="/app/admin/admin_equipmentMgt.html" class="admin-card">
                <div class="admin-card-icon" style="background: rgba(129, 173, 231, 0.15); color: #81ade7;">
                    <i class="mdi mdi-cube-outline"></i>
                </div>
                <div class="admin-card-title">Manage Items</div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim);"></i>
            </a>

            <a href="/app/admin/admin_serviceMgt.html" class="admin-card">
                <div class="admin-card-icon" style="background: rgba(98, 184, 234, 0.15); color: #62b8ea;">
                    <i class="mdi mdi-tools"></i>
                </div>
                <div class="admin-card-title">Manage Services</div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim);"></i>
            </a>

            <a href="/app/admin/admin_delivery.html" class="admin-card">
                <div class="admin-card-icon" style="background: rgba(16, 185, 129, 0.15); color: #10b981;">
                    <i class="mdi mdi-car-outline"></i>
                </div>
                <div class="admin-card-title">Manage Deliveries</div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim);"></i>
            </a>

            <a href="/app/admin/admin_userMgt.html" class="admin-card">
                <div class="admin-card-icon" style="background: rgba(245, 158, 11, 0.15); color: #f59e0b;">
                    <i class="mdi mdi-account-group-outline"></i>
                </div>
                <div class="admin-card-title">Manage Users</div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim);"></i>
            </a>

            <a href="/app/admin/admin_escort_match.html" class="admin-card">
                <div class="admin-card-icon" style="background: rgba(139, 92, 246, 0.15); color: #8b5cf6;">
                    <i class="mdi mdi-hand-pointing-left"></i>
                </div>
                <div class="admin-card-title">Escort Matching</div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim);"></i>
            </a>
        </div>

        <div class="info-box">
            <i class="mdi mdi-information-outline"></i>
            <div class="info-text">
                System updates and logs are tracked in real-time. Please ensure all modifications are documented.
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc } from '/app/firebase.js';

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/app/login.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    document.getElementById('loader').style.display = 'none';
                } else {
                    alert('Unauthorized access. Admin privileges required.');
                    window.location.href = '/app/index.html';
                }
            } catch (e) {
                console.error(e);
                window.location.href = '/app/index.html';
            }
        });
    </script>
</body>

</html>
