<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Discover — TwinXCare</title>
  <link rel="stylesheet" href="/app/app.css">
  <style>
    /* small page-specific tweaks while leveraging shared tokens in app.css */
    .container{max-width:1100px;margin:48px auto;padding:0 20px}
    .subtitle{margin:0 0 20px;font-weight:600}
    .searchBox{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:18px;background:var(--surface);margin-bottom:20px}
    .searchBox input{flex:1;border:0;background:transparent;font-size:15px;font-weight:600;outline:none;color:var(--text)}
    .tabs{display:flex;gap:12px;padding:6px;border-radius:20px;background:var(--surface);margin-bottom:24px}
    .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:16px;cursor:pointer;font-weight:800}
    .tab.active{border:2px solid var(--primary);background:var(--surface);color:var(--primary)}
    .sectionHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .filterBtn{padding:8px;border-radius:12px;border:1.5px solid var(--primary);background:var(--surface);cursor:pointer;color:var(--primary)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
    .card{border-radius:18px;overflow:hidden;border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;text-decoration:none;color:inherit}
    .card .img{width:100%;aspect-ratio:1.1;background:var(--background);position:relative}
    .card img{width:100%;height:100%;object-fit:cover;display:block}
    .priceTag{position:absolute;right:12px;bottom:12px;background:var(--primary);color:#fff;padding:6px 10px;border-radius:10px;font-weight:900;font-size:12px}
    .card .content{padding:16px}
    .itemName{font-weight:800;font-size:14px;margin:0 0 6px}
    .itemBrand{font-size:12px;color:var(--text-dim);margin:0 0 12px}
    .footer{display:flex;align-items:center;gap:6px;color:var(--primary);font-weight:800;text-transform:uppercase;font-size:11px}
    .empty{padding:60px;text-align:center;color:var(--text-dim)}
    .resultsCount{font-weight:800}
  </style>
</head>
<body>
  <div class="container">
    <h1>Discover</h1>
    <p class="subtitle">Explore advanced medical equipment and professional services</p>

    <div class="searchBox">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 21l-4.35-4.35" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <input id="searchInput" placeholder="Find equipment..." />
      <button id="refreshBtn" title="Refresh" style="border:0;background:transparent;cursor:pointer;color:var(--muted)">⟳</button>
    </div>

    <div class="tabs">
      <div id="tabEquipment" class="tab active">⚕️ Equipment</div>
      <div id="tabServices" class="tab">✨ Services</div>
    </div>

    <div class="sectionHeader">
      <div><span class="resultsCount" id="resultsCount">0</span> <span id="modeLabel">equipment</span> available</div>
      <button class="filterBtn">⚙️</button>
    </div>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none">
      <svg width="84" height="84" viewBox="0 0 24 24" fill="none" style="opacity:0.18"><path d="M21 21l-4.35-4.35" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="11" cy="11" r="6" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <h3 style="margin:16px 0 6px">No items matches your search</h3>
      <div style="color:var(--muted)">Try checking your spelling or use more general terms.</div>
    </div>
  </div>

  <script type="module">
    import { getDocs, collection, db, convertGoogleDriveLink } from './firebase.js';

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    const resultsCount = document.getElementById('resultsCount');
    const modeLabel = document.getElementById('modeLabel');
    const searchInput = document.getElementById('searchInput');
    const tabEquipment = document.getElementById('tabEquipment');
    const tabServices = document.getElementById('tabServices');
    const refreshBtn = document.getElementById('refreshBtn');

    let viewMode = 'equipment';
    let equipmentItems = [];
    let servicesItems = [];

    tabEquipment.addEventListener('click', ()=>{ setMode('equipment') });
    tabServices.addEventListener('click', ()=>{ setMode('services') });
    refreshBtn.addEventListener('click', fetchData);
    searchInput.addEventListener('input', render);

    function setMode(mode){
      viewMode = mode;
      modeLabel.textContent = mode;
      tabEquipment.classList.toggle('active', mode==='equipment');
      tabServices.classList.toggle('active', mode==='services');
      searchInput.placeholder = `Find ${mode}...`;
      render();
    }

    async function fetchEquipment(){
      const snap = await getDocs(collection(db,'equipment'));
      equipmentItems = snap.docs.map(d=>({ docId:d.id, ...d.data() }));
    }

    async function fetchServices(){
      const snap = await getDocs(collection(db,'services'));
      servicesItems = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    }

    async function fetchData(){
      try{
        await Promise.all([fetchEquipment(), fetchServices()]);
        render();
      }catch(e){console.error(e)}
    }

    function toImage(link){
      try{return convertGoogleDriveLink(link||'') }catch(e){return 'https://images.unsplash.com/photo-1576091160550-217359f49f4c?auto=format&fit=crop&q=80&w=400'}
    }

    function render(){
      const q = (searchInput.value||'').toLowerCase();
      const items = (viewMode==='equipment'?equipmentItems:servicesItems).filter(item=>((item.name||'')+' '+(item.brand||item.company||'')).toLowerCase().includes(q));
      grid.innerHTML = '';
      resultsCount.textContent = String(items.length);
      if(items.length===0){ empty.style.display='block'; return } else { empty.style.display='none' }

      for(const item of items){
        const card = document.createElement('a');
        card.className='card';
        const imageUrl = toImage(item.image||'');
        card.href = viewMode==='equipment'
          ? `/app/rental/order.html?docId=${encodeURIComponent(item.docId||item.id)}&price=${encodeURIComponent(item.price||0)}&stock=${encodeURIComponent(item.stock||0)}&name=${encodeURIComponent(item.name||'')}&image=${encodeURIComponent(imageUrl)}`
          : `/app/rental/booking.html?docId=${encodeURIComponent(item.id||item.docId)}&price=${encodeURIComponent(item.price||0)}&schedule=${encodeURIComponent(JSON.stringify(item.schedule||[]))}&image=${encodeURIComponent(imageUrl)}`;
        card.innerHTML = `
          <div class="img"><img src="${imageUrl}" alt="${(item.name||'').replace(/"/g,'')}"><div class="priceTag">$${item.price||0}</div></div>
          <div class="content">
            <div class="itemName">${escapeHtml(item.name||'Unnamed')}</div>
            <div class="itemBrand">${escapeHtml(viewMode==='equipment'?item.brand:item.company||'')}</div>
            <div class="footer">${viewMode==='equipment'?'📦':'⏱️'} <div style="margin-left:6px">${viewMode==='equipment'?((item.stock||0)+' in stock'):(item.duration||'')}</div></div>
          </div>`;
        // ensure images have a fallback if they fail to load
        const imgEl = card.querySelector('img');
        imgEl.onerror = () => { imgEl.src = 'https://images.unsplash.com/photo-1576091160550-217359f49f4c?auto=format&fit=crop&q=80&w=400'; }
        grid.appendChild(card);
      }
    }

    function escapeHtml(str){ return String(str||'').replace(/[&<>"']/g, s=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[s]) }

    // initial load
    fetchData();
  </script>
</body>
</html>
