<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Services</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#121212">
</head>

<body>

    <!-- Main Content -->
    <main class="fade-in">
        <div class="section-title">
            <i class="mdi mdi-car-sports" style="color: var(--primary);"></i>
            Care Services
        </div>

        <input type="text" class="search-bar" placeholder="Search services...">

        <!-- Dummy Services List -->
        <div class="item-card">
            <div class="icon-container"
                style="margin: 16px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(79, 134, 255, 0.1);">
                <i class="mdi mdi-ambulance" style="font-size: 30px;"></i>
            </div>
            <div class="item-info">
                <div class="item-brand">TRANSPORT</div>
                <div class="item-title">Medical Escort</div>
                <div class="item-bottom">
                    <div class="item-price">$45/trip</div>
                </div>
            </div>
        </div>

        <div class="item-card">
            <div class="icon-container"
                style="margin: 16px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(79, 255, 134, 0.1); color: var(--success);">
                <i class="mdi mdi-account-heart" style="font-size: 30px;"></i>
            </div>
            <div class="item-info">
                <div class="item-brand">NURSING</div>
                <div class="item-title">Home Nursing Care</div>
                <div class="item-bottom">
                    <div class="item-price">$120/session</div>
                </div>
            </div>
        </div>

        <div class="item-card">
            <div class="icon-container"
                style="margin: 16px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: rgba(255, 170, 0, 0.1); color: #FFB800;">
                <i class="mdi mdi-car-side" style="font-size: 30px;"></i>
            </div>
            <div class="item-info">
                <div class="item-brand">TRANSPORT</div>
                <div class="item-title">Non-Emergency Transport</div>
                <div class="item-bottom">
                    <div class="item-price">$30/trip</div>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/app/index.html" class="nav-item">
            <i class="mdi mdi-home"></i>
            <span>Home</span>
        </a>
        <a href="/app/explore.html" class="nav-item">
            <i class="mdi mdi-compass"></i>
            <span>Explore</span>
        </a>
        <a href="/app/services.html" class="nav-item active">
            <i class="mdi mdi-car-sports"></i>
            <span>Services</span>
        </a>
        <a href="/app/delivery.html" class="nav-item">
            <i class="mdi mdi-truck-delivery"></i>
            <span>History</span>
        </a>
        <a href="/app/settings.html" class="nav-item">
            <i class="mdi mdi-cog"></i>
            <span>Settings</span>
        </a>
    </nav>

</body>

</html>
