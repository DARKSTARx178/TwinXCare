<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Home</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#121212">
</head>

<body>

    <!-- Main Content -->
    <main class="fade-in">
        <div class="header-container">
            <img src="/assets/images/logo_all-white.png" alt="TwinXCare Logo" class="logo"
                onerror="this.src='https://via.placeholder.com/140x120?text=TwinXCare'">
            <h1 style="color: var(--text); font-weight: 800;">Home</h1>
            <p style="color: var(--text-dim); margin-top: 4px;">Welcome</p>
        </div>

        <!-- Grid Layout -->
        <div class="row">
            <a href="explore.html" class="card" style="text-decoration: none;">
                <div class="icon-container">
                    <i class="mdi mdi-hospital-box" style="font-size: 32px;"></i>
                </div>
                <div style="color: var(--text); font-weight: 600; margin-top: 8px;">Book Equipment</div>
            </a>
            <a href="services.html" class="card" style="text-decoration: none;">
                <div class="icon-container">
                    <i class="mdi mdi-car-side" style="font-size: 32px;"></i>
                </div>
                <div style="color: var(--text); font-weight: 600; margin-top: 8px;">Services</div>
            </a>
        </div>

        <div class="row">
            <a href="#" class="card card-full" style="text-decoration: none;">
                <div class="icon-container icon-container-row">
                    <i class="mdi mdi-hand-heart" style="font-size: 32px;"></i>
                </div>
                <div style="flex: 1; color: var(--text); font-weight: 600; font-size: 1.1rem;">Assistance</div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim); font-size: 24px;"></i>
            </a>
        </div>

        <div style="padding: 0 20px; margin-bottom: 20px;">
            <a href="delivery.html" class="btn">My Rentals</a>
        </div>

        <!-- Auth Section -->
        <div class="auth-section">
            <h2 style="font-weight: 700; margin-bottom: 15px;">Welcome</h2>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <a href="#" class="btn" style="flex: 1;">Create Account</a>
                <a href="#" class="btn btn-solid" style="flex: 1;">Login</a>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="mdi mdi-home"></i>
            <span>Home</span>
        </a>
        <a href="explore.html" class="nav-item">
            <i class="mdi mdi-compass"></i>
            <span>Explore</span>
        </a>
        <a href="services.html" class="nav-item">
            <i class="mdi mdi-car-sports"></i>
            <span>Services</span>
        </a>
        <a href="delivery.html" class="nav-item">
            <i class="mdi mdi-truck-delivery"></i>
            <span>History</span>
        </a>
        <a href="settings.html" class="nav-item">
            <i class="mdi mdi-cog"></i>
            <span>Settings</span>
        </a>
    </nav>

</body>

</html>
