<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="logo"><div class="logo-icon"><img src="../assets/images/logo_all-white.png" alt="Logo"></div><h1>TwinXCare</h1></a>
    <div class="nav-links"><a href="index.html" class="nav-link">App Home</a><a href="../index.html" class="nav-link">Main Site</a></div>
  </div>
</nav>
<main class="container" style="padding:2rem 1rem;">
  <section style="max-width:780px;margin:18px auto;">
    <h2>Share Your Feedback</h2>
    <p style="color:var(--text-dim)">Your experience matters. Tell us how we're doing.</p>

    <div style="margin-top:16px;">
      <label style="display:block;margin-bottom:8px;color:var(--text-dim)">Overall Rating</label>
      <div id="stars" style="display:flex;gap:8px;">
        <button class="star" data-value="1">☆</button>
        <button class="star" data-value="2">☆</button>
        <button class="star" data-value="3">☆</button>
        <button class="star" data-value="4">☆</button>
        <button class="star" data-value="5">☆</button>
      </div>

      <label style="display:block;margin-top:14px;color:var(--text-dim)">Your Comments</label>
      <textarea id="feedbackMsg" style="width:100%;min-height:120px;padding:12px;border-radius:12px;border:1px solid var(--border);"></textarea>

      <div style="margin-top:12px;display:flex;gap:12px;align-items:center">
        <button id="submitFeedback" class="btn-app">Submit Feedback</button>
        <div id="fbStatus" style="color:var(--text-dim)"></div>
      </div>
    </div>

    <p style="margin-top:18px"><a href="index.html">Back to app home</a></p>
  </section>

  <script>
    let rating = 0;
    document.querySelectorAll('#stars .star').forEach(btn => btn.addEventListener('click', (e) => {
      rating = Number(btn.dataset.value);
      document.querySelectorAll('#stars .star').forEach(s=> s.textContent = s.dataset.value <= rating ? '★' : '☆');
    }));
    document.getElementById('submitFeedback').addEventListener('click', () => {
      const msg = document.getElementById('feedbackMsg').value.trim();
      const st = document.getElementById('fbStatus');
      if (!msg) { st.textContent = 'Please enter your feedback.'; return; }
      if (rating === 0) { st.textContent = 'Please select a rating.'; return; }
      st.textContent = 'Submitting...'; setTimeout(()=>{ st.textContent='Feedback submitted (demo).'; document.getElementById('feedbackMsg').value=''; },800);
    });
  </script>
</main>
<footer>
  <div class="container"><div class="footer-bottom">&copy; 2026 TwinXCare</div></div>
</footer>
</body>
</html>
