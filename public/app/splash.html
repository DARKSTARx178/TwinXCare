<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Splash — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="splashWrap" style="min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:40px 12px;">
  <div id="logoCircle" style="width:120px;height:120px;border-radius:40px;display:flex;align-items:center;justify-content:center;background:var(--bg-soft);">
    <img src="../assets/images/logo_all-white.png" alt="Logo" style="width:70px;height:70px;object-fit:contain;filter:grayscale(1) brightness(0) invert(1)">
  </div>
  <h1 style="margin-top:20px">TwinXCare</h1>
  <p style="color:var(--text-dim)">Advanced Care Intelligence</p>

  <div style="width:60%;max-width:320px;margin-top:26px;">
    <div style="height:6px;background:#F1F5F9;border-radius:4px;overflow:hidden">
      <div id="progress" style="height:100%;width:0%;background:var(--primary);transition:width 1s ease"></div>
    </div>
    <p id="ver" style="text-align:center;margin-top:10px;color:var(--text-dim);font-weight:700;font-size:12px">Version 2.0.4 • Alpha</p>
  </div>
</div>

<script>
  // Simulate the native splash behavior and then navigate to tabs
  setTimeout(()=>{ document.getElementById('progress').style.width='70%'; },200);
  setTimeout(()=>{ document.getElementById('progress').style.width='100%'; },900);
  setTimeout(()=>{ window.location.href='(tabs)/index.html'; },1800);
</script>
</body>
</html>
