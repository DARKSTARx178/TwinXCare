<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logout — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="logo"><div class="logo-icon"><img src="../assets/images/logo_all-white.png" alt="Logo"></div><h1>TwinXCare</h1></a>
    <div class="nav-links"><a href="index.html" class="nav-link">App Home</a><a href="../index.html" class="nav-link">Main Site</a></div>
  </div>
</nav>
<main class="container" style="padding:2rem 1rem;">
  <section style="max-width:720px;margin:12px auto;text-align:center;">
    <div style="margin-bottom:18px;">
      <h2>Security Sign-out</h2>
      <p style="color:var(--text-dim)">Are you sure you want to end your current session?</p>
    </div>

    <div style="background:var(--bg-soft);padding:20px;border-radius:16px;max-width:520px;margin:0 auto;">
      <div style="font-size:48px;margin-bottom:12px;color:var(--primary)">🔒</div>
      <p style="font-weight:700;margin:0 0 8px 0">Safe & Secure</p>
      <p style="color:var(--text-dim);margin-bottom:16px">Logging out will clear your active session. You'll need to sign back in to access your data.</p>

      <div style="display:flex;gap:12px;justify-content:center">
        <button id="confirmLogout" class="btn-app" style="background:#fff;color:#ef4444;border:1px solid #ef4444">Confirm Logout</button>
        <button id="stayBtn" class="btn-app">Stay Logged In</button>
      </div>
    </div>

    <p style="text-align:center;margin-top:18px"><a href="index.html">Back to app home</a></p>
  </section>

  <script>
    document.getElementById('confirmLogout').addEventListener('click', ()=>{
      alert('Signed out (demo). Redirecting to login.'); window.location.href='login.html';
    });
    document.getElementById('stayBtn').addEventListener('click', ()=> history.back());
  </script>
</main>
<footer>
  <div class="container"><div class="footer-bottom">&copy; 2026 TwinXCare</div></div>
</footer>
</body>
</html>
