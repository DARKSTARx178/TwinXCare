<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="logo"><div class="logo-icon"><img src="../assets/images/logo_all-white.png" alt="Logo"></div><h1>TwinXCare</h1></a>
    <div class="nav-links"><a href="index.html" class="nav-link">App Home</a><a href="../index.html" class="nav-link">Main Site</a></div>
  </div>
</nav>
<main class="container" style="padding:2rem 1rem;">
  <section style="max-width:820px;margin:12px auto;">
    <div id="profileHeader" style="display:flex;gap:18px;align-items:center;flex-wrap:wrap;">
      <div id="avatar" style="width:110px;height:110px;border-radius:55px;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--primary);font-weight:800">G</div>
      <div style="flex:1;min-width:220px">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
          <h2 id="username" style="margin:0">Guest</h2>
          <div id="roleBadge" style="padding:6px 10px;border-radius:999px;background:rgba(129,173,231,0.08);color:var(--primary);font-weight:700;font-size:12px">USER</div>
        </div>
        <p id="email" style="margin-top:8px;color:var(--text-dim)">Not signed in</p>
      </div>

      <div style="display:flex;gap:10px;align-items:center">
        <button id="signInBtn" class="btn-app">Sign In</button>
        <button id="registerBtn" class="btn-app" style="background:#fff;color:var(--primary);border:1px solid var(--primary)">Register</button>
      </div>
    </div>

    <div id="menu" style="margin-top:20px">
      <div class="menu-card">
        <a class="menu-item" href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a class="menu-item" href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a class="menu-item" href="helpdocs.html"><i class="fas fa-question-circle"></i> Help</a>
        <a class="menu-item" id="logoutLink" href="#"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>

    <div id="adminPanel" style="margin-top:18px;display:none">
      <button id="adminBtn" class="btn-app" style="background:transparent;color:var(--primary);border:1px solid var(--primary)">Enter Admin View</button>
    </div>

    <p style="text-align:center;margin-top:18px"><a href="index.html">Back to app home</a></p>
  </section>

  <script>
    // Demo: simulate user state toggling for the static page
    let user = null;
    function updateUI(){
      const username = document.getElementById('username');
      const email = document.getElementById('email');
      const avatar = document.getElementById('avatar');
      const signInBtn = document.getElementById('signInBtn');
      const registerBtn = document.getElementById('registerBtn');
      const logoutLink = document.getElementById('logoutLink');
      const adminPanel = document.getElementById('adminPanel');

      if(user){
        username.textContent = user.name || user.email.split('@')[0];
        email.textContent = user.email;
        avatar.textContent = (user.name||user.email||'?').charAt(0).toUpperCase();
        signInBtn.style.display='none'; registerBtn.style.display='none'; logoutLink.style.display='block'; adminPanel.style.display = user.role==='admin' ? 'block' : 'none';
      } else {
        username.textContent = 'Guest'; email.textContent='Not signed in'; avatar.textContent='G'; signInBtn.style.display='inline-block'; registerBtn.style.display='inline-block'; logoutLink.style.display='none'; adminPanel.style.display='none';
      }
    }

    document.getElementById('signInBtn').addEventListener('click', ()=> location.href='login.html');
    document.getElementById('registerBtn').addEventListener('click', ()=> location.href='register.html');
    document.getElementById('logoutLink').addEventListener('click', (e)=>{ e.preventDefault(); user=null; updateUI(); alert('Signed out (demo)'); });

    // For demo, if query ?demo=admin set admin user
    const params = new URLSearchParams(window.location.search);
    if(params.get('demo')==='admin'){ user={name:'Admin',email:'admin@twinxcare.com',role:'admin'} }
    else if(params.get('demo')==='user'){ user={name:'Jamie',email:'jamie@example.com',role:'user'} }
    updateUI();
  </script>
</main>
<footer>
  <div class="container"><div class="footer-bottom">&copy; 2026 TwinXCare</div></div>
</footer>
</body>
</html>
