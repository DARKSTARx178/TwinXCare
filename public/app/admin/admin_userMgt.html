<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - User Management</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .admin-header {
            margin-top: 80px;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--primary-glow);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 40px;
        }

        .users-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .user-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .user-info-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar-circle {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text);
        }

        .user-email {
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .actions-row {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text);
        }

        .action-btn:hover {
            background: var(--surface-hover);
        }

        .delete-btn {
            border-color: #ef4444;
            color: #ef4444;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.05);
        }

        .delete-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--border);
            color: var(--text-dim);
        }

        .back-btn {
            position: absolute;
            top: 25px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            text-decoration: none;
            font-size: 20px;
            transition: var(--transition);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <a href="./index.html" class="back-btn">
        <i class="mdi mdi-arrow-left"></i>
    </a>

    <main class="fade-in">
        <div class="admin-header">
            <div class="icon-circle">
                <i class="mdi mdi-account-group-outline"></i>
            </div>
            <h1>User Management</h1>
            <p id="user-count">Directory of accounts</p>
        </div>

        <div class="users-list" id="users-list">
            <!-- Users will be populated here -->
        </div>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, collection, getDocs, updateDoc } from '/app/firebase.js';
        import { Analytics } from "@vercel/analytics/next"

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/app/login.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    currentUser = user;
                    fetchUsers();
                } else {
                    alert('Unauthorized access. Admin privileges required.');
                    window.location.href = '/app/index.html';
                }
            } catch (e) {
                console.error(e);
                window.location.href = '/app/index.html';
            }
        });

        async function fetchUsers() {
            try {
                const querySnap = await getDocs(collection(db, 'users'));
                const usersList = document.getElementById('users-list');
                const userCount = document.getElementById('user-count');
                usersList.innerHTML = '';

                let count = 0;
                querySnap.forEach((docSnap) => {
                    const userData = docSnap.data();
                    const userId = docSnap.id;
                    const role = userData.role || 'user';
                    const isAdmin = role === 'admin';
                    count++;

                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div class="user-info-row">
                            <div class="avatar-circle" style="background: ${isAdmin ? 'var(--primary-glow)' : '#F1F5F9'}; color: ${isAdmin ? 'var(--primary)' : 'var(--text-dim)'}">
                                <i class="mdi ${isAdmin ? 'mdi-shield-check' : 'mdi-account'}"></i>
                            </div>
                            <div class="user-details">
                                <div class="user-name">${userData.username || 'Unnamed User'}</div>
                                <div class="user-email">${userData.email || 'No email provided'}</div>
                            </div>
                            <div class="role-badge" style="background: ${isAdmin ? 'rgba(129, 173, 231, 0.15)' : 'rgba(148, 163, 184, 0.1)'}; color: ${isAdmin ? 'var(--primary)' : 'var(--text-dim)'}">
                                ${role.toUpperCase()}
                            </div>
                        </div>
                        <div class="actions-row">
                            <button class="action-btn toggle-role" data-id="${userId}" data-role="${role}">
                                <i class="mdi mdi-swap-horizontal"></i>
                                Change Role
                            </button>
                            <button class="action-btn delete-btn" data-id="${userId}" data-role="${role}" ${isAdmin ? 'disabled' : ''}>
                                <i class="mdi mdi-trash-can-outline"></i>
                                Delete
                            </button>
                        </div>
                    `;
                    usersList.appendChild(card);
                });

                userCount.innerText = `Directory of ${count} registered accounts`;
                document.getElementById('loader').style.display = 'none';

                // Add event listeners
                document.querySelectorAll('.toggle-role').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.getAttribute('data-id');
                        const currentRole = btn.getAttribute('data-role');
                        toggleRole(id, currentRole);
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.getAttribute('data-id');
                        const role = btn.getAttribute('data-role');
                        deleteUser(id, role);
                    });
                });

            } catch (err) {
                console.error('Error fetching users:', err);
                alert('Could not fetch users');
            }
        }

        async function toggleRole(userId, currentRole) {
            const newRole = currentRole === 'admin' ? 'user' : 'admin';
            if (!confirm(`Are you sure you want to change this user's role to ${newRole}?`)) return;

            try {
                await updateDoc(doc(db, 'users', userId), { role: newRole });
                alert(`User role updated to ${newRole}`);
                fetchUsers();
            } catch (err) {
                console.error('Error updating role:', err);
                alert('Could not update role');
            }
        }

        async function deleteUser(userId, role) {
            if (role === 'admin') {
                alert('You must switch the user role to "user" before deleting an admin account.');
                return;
            }

            if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;

            try {
                const token = await auth.currentUser?.getIdToken();
                if (!token) {
                    throw new Error('Missing admin session');
                }

                const res = await fetch('/api/admin-delete-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({ targetUserId: userId }),
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || 'Could not delete user');
                }

                alert('User has been removed from Firebase Auth and Firestore');
                fetchUsers();
            } catch (err) {
                console.error('Error deleting user:', err);
                alert(err.message || 'Could not delete user');
            }
        }
    </script>
</body>

</html>
