<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Change Password</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 20px 20px;
        }

        .back-button {
            position: fixed;
            top: 50px;
            left: 20px;
            z-index: 10;
            padding: 8px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.03);
            color: var(--text);
            text-decoration: none;
        }

        .card {
            padding: 30px;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        .logo-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: rgba(129, 173, 231, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            color: var(--primary);
            font-size: 32px;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 25px;
            font-weight: 500;
        }

        .input-wrapper {
            text-align: left;
            margin-bottom: 16px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            display: block;
        }

        .input-container {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 0 16px;
            background: #F1F5F9;
        }

        .input-icon {
            margin-right: 10px;
            color: var(--text-dim);
            font-size: 20px;
        }

        .input {
            flex: 1;
            padding: 14px 0;
            font-size: 0.95rem;
            font-weight: 500;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
        }

        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 2px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            font-size: 1rem;
            font-weight: 800;
            margin-top: 16px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 8px;
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-button">
            <i class="mdi mdi-arrow-left" style="font-size: 24px;"></i>
        </a>

        <div class="card">
            <div class="logo-circle">
                <i class="mdi mdi-key-outline"></i>
            </div>

            <div class="title">Change Password</div>
            <div class="subtitle">Update your security credentials for TwinXCare</div>

            <form id="pw-form">
                <div class="input-wrapper">
                    <label class="label">Current Password</label>
                    <div class="input-container">
                        <i class="mdi mdi-lock-outline input-icon"></i>
                        <input type="password" id="current-pw" class="input" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label class="label">New Password</label>
                    <div class="input-container">
                        <i class="mdi mdi-shield-lock-outline input-icon"></i>
                        <input type="password" id="new-pw" class="input" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label class="label">Confirm New Password</label>
                    <div class="input-container">
                        <i class="mdi mdi-check-circle-outline input-icon"></i>
                        <input type="password" id="confirm-pw" class="input" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">
                    Update Password <i class="mdi mdi-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from '/app/firebase.js';

        const form = document.getElementById('pw-form');
        const btnSubmit = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return alert('No user logged in!');

            const currentPw = document.getElementById('current-pw').value;
            const newPw = document.getElementById('new-pw').value;
            const confirmPw = document.getElementById('confirm-pw').value;

            if (newPw !== confirmPw) return alert('New passwords do not match.');

            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Updating...';

            try {
                const credential = EmailAuthProvider.credential(user.email, currentPw);
                await reauthenticateWithCredential(user, credential);
                await updatePassword(user, newPw);

                alert('Password changed successfully.');
                window.history.back();
            } catch (err) {
                console.error(err);
                alert(err.message || 'Failed to change password.');
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Update Password <i class="mdi mdi-arrow-right"></i>';
            }
        });
    </script>
</body>

</html>
