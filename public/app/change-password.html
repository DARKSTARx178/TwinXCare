<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="logo"><div class="logo-icon"><img src="../assets/images/logo_all-white.png" alt="Logo"></div><h1>TwinXCare</h1></a>
    <div class="nav-links"><a href="index.html" class="nav-link">App Home</a><a href="../index.html" class="nav-link">Main Site</a></div>
  </div>
</nav>
<main class="container" style="padding:2rem 1rem;">
  <section style="max-width:620px;margin:18px auto;">
    <h2>Change Password</h2>
    <p style="color:var(--text-dim)">Update your security credentials for TwinXCare</p>

    <form id="pwForm" style="margin-top:16px;">
      <label style="display:block;margin-top:12px;color:var(--text-dim)">Current Password</label>
      <input type="password" id="currentPw" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);" />

      <label style="display:block;margin-top:12px;color:var(--text-dim)">New Password</label>
      <input type="password" id="newPw" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);" />

      <label style="display:block;margin-top:12px;color:var(--text-dim)">Confirm New Password</label>
      <input type="password" id="confirmPw" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);" />

      <div style="margin-top:18px;display:flex;gap:12px;align-items:center">
        <button type="button" id="updatePwBtn" class="btn-app">Update Password</button>
        <div id="pwStatus" style="color:var(--text-dim)"></div>
      </div>
    </form>

    <p style="margin-top:18px"><a href="index.html">Back to app home</a></p>
  </section>

  <script>
    document.getElementById('updatePwBtn').addEventListener('click', () => {
      const cur = document.getElementById('currentPw').value;
      const n = document.getElementById('newPw').value;
      const c = document.getElementById('confirmPw').value;
      const s = document.getElementById('pwStatus');
      if (!cur || !n || !c) { s.textContent = 'Please fill in all fields.'; return; }
      if (n !== c) { s.textContent = 'New passwords do not match.'; return; }
      s.textContent = 'Updating... (static demo)';
      setTimeout(() => s.textContent = 'Password updated (demo).', 900);
    });
  </script>
</main>
<footer>
  <div class="container"><div class="footer-bottom">&copy; 2026 TwinXCare</div></div>
</footer>
</body>
</html>
