<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Home</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
</head>

<body>

    <main class="fade-in">
        <div class="header-container">
            <img src="/assets/images/logo_all-white.png" alt="TwinXCare Logo" class="logo"
                onerror="this.src='https://via.placeholder.com/140x120?text=TwinXCare'">
            <h1>Home</h1>
            <p id="welcome-text">Loading...</p>
        </div>

        <div class="row">
            <a href="/app/explore.html" class="card" style="text-decoration: none;">
                <div class="icon-container">
                    <i class="mdi mdi-hospital-box" style="font-size: 32px;"></i>
                </div>
                <div style="color: var(--text); font-weight: 600; margin-top: 8px;">Book Equipment</div>
            </a>
            <a href="/app/services.html" class="card" style="text-decoration: none;">
                <div class="icon-container">
                    <i class="mdi mdi-car-side" style="font-size: 32px;"></i>
                </div>
                <div style="color: var(--text); font-weight: 600; margin-top: 8px;">Services</div>
            </a>
        </div>

        <div class="row">
            <a href="#" class="card card-full" style="text-decoration: none;">
                <div class="icon-container icon-container-row">
                    <i class="mdi mdi-hand-heart" style="font-size: 32px;"></i>
                </div>
                <div style="flex: 1; color: var(--text); font-weight: 600; font-size: 1.1rem;">Assistance</div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim); font-size: 24px;"></i>
            </a>
        </div>

        <div style="margin-bottom: 20px;">
            <a href="/app/delivery.html" class="btn">My Rentals</a>
        </div>

        <!-- Auth Section -->
        <div class="auth-section" id="auth-section" style="display: none;">
            <h2 style="font-weight: 700; margin-bottom: 15px;">Welcome</h2>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <a href="/register" class="btn" style="flex: 1;">Create Account</a>
                <a href="/login" class="btn btn-solid" style="flex: 1;">Login</a>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="/app/index.html" class="nav-item active">
                <i class="mdi mdi-home"></i>
                <span>Home</span>
            </a>
            <a href="/app/explore.html" class="nav-item">
                <i class="mdi mdi-compass"></i>
                <span>Explore</span>
            </a>
            <a href="/app/services.html" class="nav-item">
                <i class="mdi mdi-car-sports"></i>
                <span>Services</span>
            </a>
            <a href="/app/delivery.html" class="nav-item">
                <i class="mdi mdi-truck-delivery"></i>
                <span>History</span>
            </a>
            <a href="/app/settings.html" class="nav-item">
                <i class="mdi mdi-cog"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc } from '/app/firebase.js';

        onAuthStateChanged(auth, async (user) => {
            const welcomeText = document.getElementById('welcome-text');
            const authSection = document.getElementById('auth-section');

            if (user) {
                welcomeText.innerText = "Welcome back!";
                authSection.style.display = 'none';

                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists() && userDoc.data().name) {
                        welcomeText.innerText = `Welcome, ${userDoc.data().name}`;
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                welcomeText.innerText = "Welcome";
                authSection.style.display = 'block';
            }
        });
    </script>
</body>

</html>
