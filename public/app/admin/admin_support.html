<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Support Inbox</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <style>
        .header { text-align: center; margin: 30px 0 24px; }
        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            margin: 0 auto 14px;
            background: rgba(129, 173, 231, 0.15);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        .section { margin-bottom: 22px; }
        .section-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 10px; color: var(--text); }
        .card {
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
        .username { font-size: .9rem; font-weight: 700; color: var(--text); }
        .time { font-size: .72rem; color: var(--text-dim); }
        .meta { margin-top: 8px; font-size: .78rem; font-weight: 700; color: var(--primary); }
        .message { margin-top: 8px; font-size: .84rem; line-height: 1.45; color: var(--text); }
        .empty { font-size: .82rem; color: var(--text-dim); }
        .back-btn {
            position: absolute;
            top: 25px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            text-decoration: none;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <a href="/app/admin/index.html" class="back-btn"><i class="mdi mdi-arrow-left"></i></a>

    <main>
        <div class="header">
            <div class="icon-circle"><i class="mdi mdi-email-open-outline"></i></div>
            <h1>Support Inbox</h1>
            <p>Feedback and assistance requests from users</p>
        </div>

        <section class="section">
            <div class="section-title" id="feedback-title">Feedback (0)</div>
            <div id="feedback-list"></div>
        </section>

        <section class="section">
            <div class="section-title" id="request-title">Assistance Requests (0)</div>
            <div id="request-list"></div>
        </section>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, collection, getDocs, query, orderBy } from '/app/firebase.js';

        const feedbackList = document.getElementById('feedback-list');
        const requestList = document.getElementById('request-list');
        const feedbackTitle = document.getElementById('feedback-title');
        const requestTitle = document.getElementById('request-title');

        const formatDate = (value) => {
            if (!value || !value.toDate) return 'Pending timestamp';
            return value.toDate().toLocaleString();
        };

        const renderCard = (item, type) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="row">
                    <div class="username">${item.username || 'Anonymous'}</div>
                    <div class="time">${formatDate(item.createdAt)}</div>
                </div>
                ${type === 'feedback' && typeof item.rating === 'number' ? `<div class="meta">Rating: ${item.rating}/5</div>` : ''}
                <div class="message">${item.message || '-'}</div>
            `;
            return div;
        };

        const renderEmpty = (container, text) => {
            const p = document.createElement('p');
            p.className = 'empty';
            p.textContent = text;
            container.appendChild(p);
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/app/login.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists() || userDoc.data().role !== 'admin') {
                    alert('Unauthorized access. Admin privileges required.');
                    window.location.href = '/app/index.html';
                    return;
                }

                const feedbackSnap = await getDocs(query(collection(db, 'feedback'), orderBy('createdAt', 'desc')));
                const requestSnap = await getDocs(query(collection(db, 'requests'), orderBy('createdAt', 'desc')));

                feedbackTitle.textContent = `Feedback (${feedbackSnap.size})`;
                requestTitle.textContent = `Assistance Requests (${requestSnap.size})`;

                if (feedbackSnap.empty) {
                    renderEmpty(feedbackList, 'No feedback submitted yet.');
                } else {
                    feedbackSnap.forEach((d) => feedbackList.appendChild(renderCard(d.data(), 'feedback')));
                }

                if (requestSnap.empty) {
                    renderEmpty(requestList, 'No assistance requests submitted yet.');
                } else {
                    requestSnap.forEach((d) => requestList.appendChild(renderCard(d.data(), 'request')));
                }
            } catch (e) {
                console.error(e);
                alert('Failed to load support inbox.');
            }
        });
    </script>
</body>

</html>
