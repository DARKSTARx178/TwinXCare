<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Payment</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: var(--primary-glow);
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
        }

        .card {
            padding: 24px;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-heading {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 15px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-container {
            display: flex;
            align-items: flex-start;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            background: #F1F5F9;
        }

        .input {
            flex: 1;
            font-size: 0.95rem;
            border: none;
            background: transparent;
            outline: none;
            color: var(--text);
            min-height: 60px;
            resize: none;
            font-family: inherit;
        }

        .suggestions {
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-top: 8px;
            overflow: hidden;
            background: var(--surface);
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
        }

        .suggestion-item+.suggestion-item {
            border-top: 1px solid var(--border);
        }

        .hint-text {
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        .map-preview {
            margin-top: 12px;
            height: 132px;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: #e2e8f0;
            position: relative;
        }

        .map-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .map-badge {
            position: absolute;
            left: 10px;
            bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(15, 23, 42, 0.78);
            color: #fff;
            border-radius: 999px;
            padding: 6px 9px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .confirm-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            background: var(--surface);
            color: var(--primary);
            border: 2px solid var(--primary);
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .confirm-btn:hover {
            background: var(--primary);
            color: white;
        }

        .security-seal {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>

<body>

    <main class="fade-in"
        style="padding-top: 60px; padding-bottom: 40px; min-height: 100vh; display: flex; flex-direction: column;">
        <a href="javascript:history.back()"
            style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 12px; color: var(--text); text-decoration: none;">
            <i class="mdi mdi-arrow-left" style="font-size: 24px;"></i>
        </a>

        <div class="header">
            <div class="icon-circle">
                <i class="mdi mdi-cash"></i>
            </div>
            <div style="font-weight: 800; font-size: 1.5rem;" id="page-title">Payment Details</div>
            <div style="color: var(--text-dim); font-weight: 500; margin-top: 4px;" id="page-subtitle">Finalize booking
            </div>
        </div>

        <div class="card">
            <div class="card-heading">Order Summary</div>

            <div class="summary-row">
                <div style="color: var(--text-dim); font-weight: 500;">Item</div>
                <div style="font-weight: 700;" id="sum-name">Loading...</div>
            </div>
            <div class="summary-row">
                <div style="color: var(--text-dim); font-weight: 500;">Quantity</div>
                <div style="font-weight: 700;" id="sum-qty">1</div>
            </div>
            <div class="summary-row" id="row-duration">
                <div style="color: var(--text-dim); font-weight: 500;">Duration</div>
                <div style="font-weight: 700;" id="sum-dur">1 Day</div>
            </div>

            <div class="divider"></div>

            <div class="total-row">
                <div style="font-weight: 800; font-size: 1.1rem;">Total Amount</div>
                <div style="font-weight: 900; font-size: 1.5rem; color: var(--primary);" id="sum-total">$0.00</div>
            </div>
        </div>

        <div class="card" id="delivery-section" style="display: none;">
            <div class="card-heading">Delivery Information</div>
            <div
                style="font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px;">
                Address</div>
            <div class="input-container">
                <i class="mdi mdi-map-marker-outline"
                    style="color: var(--text-dim); margin-right: 10px; margin-top: 2px;"></i>
                <textarea class="input" id="address-input" placeholder="Search your delivery address"></textarea>
            </div>
            <div id="geo-hint" class="hint-text" style="display:none;">Geoapify location suggestions are unavailable.</div>
            <div id="address-suggestions" class="suggestions" style="display:none;"></div>
            <div id="address-map" class="map-preview" style="display:none;">
                <img id="address-map-image" alt="Selected location map preview" />
                <div class="map-badge"><i class="mdi mdi-map-marker"></i> Selected location</div>
            </div>
        </div>

        <button class="confirm-btn" id="btn-confirm">
            Complete Transaction <i class="mdi mdi-shield-check"></i>
        </button>

        <div class="security-seal">
            <i class="mdi mdi-lock-outline"></i> Secure SSL Encrypted Payment (Mock)
        </div>
    </main>

    <script type="module">
        import { auth, db, doc, getDoc, collection, updateDoc } from '/app/firebase.js';
        import { arrayUnion, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'equipment'; // equipment or service
        const GEOAPIFY_API_KEY = (window.TWINXCARE_GEOAPIFY_API_KEY || '333dd9a8121f4bfe8173cae287ecf657').trim();
        const GEOAPIFY_AUTOCOMPLETE_URL = (window.TWINXCARE_GEOAPIFY_AUTOCOMPLETE_URL || '').trim();

        // Extracted params
        const docId = urlParams.get('docId');
        const name = urlParams.get('name');
        const price = Number(urlParams.get('price')) || 0;

        let qty = 1;
        let days = 1;
        let totalPrice = price;
        let deliveryLocation = null;

        const addressInput = document.getElementById('address-input');
        const suggestionsBox = document.getElementById('address-suggestions');
        const mapPreview = document.getElementById('address-map');
        const mapImage = document.getElementById('address-map-image');
        const geoHint = document.getElementById('geo-hint');

        function getApiKeyFromUrl() {
            const match = GEOAPIFY_AUTOCOMPLETE_URL.match(/[?&]apiKey=([^&]+)/);
            return match ? decodeURIComponent(match[1]) : '';
        }

        const effectiveGeoApiKey = GEOAPIFY_API_KEY || getApiKeyFromUrl();
        const hasGeoConfig = Boolean(GEOAPIFY_AUTOCOMPLETE_URL || GEOAPIFY_API_KEY);
        if (!hasGeoConfig) {
            geoHint.style.display = 'block';
        }

        function appendParam(url, key, value) {
            if (new RegExp(`[?&]${key}=`).test(url)) return url;
            return `${url}${url.includes('?') ? '&' : '?'}${key}=${encodeURIComponent(value)}`;
        }

        function buildAutocompleteUrl(text) {
            const encodedText = encodeURIComponent(text);
            if (GEOAPIFY_AUTOCOMPLETE_URL) {
                let url = GEOAPIFY_AUTOCOMPLETE_URL
                    .replace('{text}', encodedText)
                    .replace('ADDRESS_TEXT', encodedText)
                    .replace(/([?&]text=)[^&]*/, `$1${encodedText}`);
                if (!/[?&]text=/.test(url)) {
                    url = `${url}${url.includes('?') ? '&' : '?'}text=${encodedText}`;
                }
                url = appendParam(url, 'format', 'json');
                url = appendParam(url, 'limit', '5');
                return url;
            }
            if (!GEOAPIFY_API_KEY) return '';
            return `https://api.geoapify.com/v1/geocode/autocomplete?text=${encodedText}&filter=countrycode:sg&format=json&limit=5&apiKey=${encodeURIComponent(GEOAPIFY_API_KEY)}`;
        }

        function getAddress(result) {
            const data = result.properties || result;
            return data.formatted || [data.address_line1, data.address_line2].filter(Boolean).join(', ');
        }

        function getCoordinates(result) {
            const data = result.properties || result;
            const longitude = data.lon ?? result.geometry?.coordinates?.[0];
            const latitude = data.lat ?? result.geometry?.coordinates?.[1];
            if (typeof latitude !== 'number' || typeof longitude !== 'number') return null;
            return { latitude, longitude };
        }

        function renderMap(selectedLocation) {
            if (!effectiveGeoApiKey || !selectedLocation) {
                mapPreview.style.display = 'none';
                return;
            }
            const lon = selectedLocation.longitude;
            const lat = selectedLocation.latitude;
            const marker = encodeURIComponent(`lonlat:${lon},${lat};color:#2563eb;size:medium`);
            mapImage.src = `https://maps.geoapify.com/v1/staticmap?style=osm-bright&width=640&height=260&center=lonlat:${lon},${lat}&zoom=15&marker=${marker}&apiKey=${encodeURIComponent(effectiveGeoApiKey)}`;
            mapPreview.style.display = 'block';
        }

        function clearSuggestions() {
            suggestionsBox.innerHTML = '';
            suggestionsBox.style.display = 'none';
        }

        function selectSuggestion(result) {
            const address = getAddress(result);
            const coords = getCoordinates(result);
            if (!address || !coords) return;
            deliveryLocation = { address, ...coords };
            addressInput.value = address;
            clearSuggestions();
            renderMap(deliveryLocation);
        }

        let autocompleteTimer;
        let autocompleteController;
        addressInput?.addEventListener('input', () => {
            deliveryLocation = null;
            mapPreview.style.display = 'none';
            const text = addressInput.value.trim();
            if (!hasGeoConfig || text.length < 3) {
                clearSuggestions();
                return;
            }
            clearTimeout(autocompleteTimer);
            if (autocompleteController) autocompleteController.abort();
            autocompleteTimer = setTimeout(async () => {
                try {
                    autocompleteController = new AbortController();
                    const response = await fetch(buildAutocompleteUrl(text), { signal: autocompleteController.signal });
                    const data = await response.json();
                    const results = data.results || data.features || [];
                    suggestionsBox.innerHTML = '';
                    if (!results.length) {
                        clearSuggestions();
                        return;
                    }
                    results.forEach((item, index) => {
                        const address = getAddress(item);
                        if (!address) return;
                        const row = document.createElement('button');
                        row.type = 'button';
                        row.className = 'suggestion-item';
                        row.style.width = '100%';
                        row.style.border = 'none';
                        row.style.background = 'transparent';
                        row.style.textAlign = 'left';
                        row.innerHTML = `<i class="mdi mdi-navigation-variant-outline" style="color: var(--primary);"></i><span>${address}</span>`;
                        row.addEventListener('click', () => selectSuggestion(item));
                        suggestionsBox.appendChild(row);
                    });
                    suggestionsBox.style.display = suggestionsBox.children.length ? 'block' : 'none';
                } catch (error) {
                    if (error?.name !== 'AbortError') {
                        clearSuggestions();
                    }
                }
            }, 450);
        });

        if (type === 'equipment') {
            qty = Number(urlParams.get('quantity')) || 1;
            days = Number(urlParams.get('rentalDays')) || 1;
            totalPrice = price * qty * days;
            document.getElementById('delivery-section').style.display = 'block';
        } else {
            document.getElementById('row-duration').style.display = 'none';
            totalPrice = price; // fixed price for service
        }

        document.getElementById('page-subtitle').innerText = `Finalize your ${type} booking`;
        document.getElementById('sum-name').innerText = name;
        document.getElementById('sum-qty').innerText = qty;
        document.getElementById('sum-dur').innerText = `${days} Day${days > 1 ? 's' : ''}`;
        document.getElementById('sum-total').innerText = `$${totalPrice.toFixed(2)}`;

        document.getElementById('btn-confirm').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) {
                alert("Please login to complete the transaction.");
                window.location.href = '/app/index.html';
                return;
            }

            const btn = document.getElementById('btn-confirm');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // Set a 20 second timeout for the entire transaction
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Transaction processing timeout')), 20000)
                );

                const transactionPromise = (async () => {
                    const userRef = doc(db, 'users', user.uid);

                    if (type === 'equipment') {
                        const address = addressInput.value.trim();
                        if (!address) {
                            throw new Error('Please enter a delivery address.');
                        }

                        // Update stock
                        const prodRef = doc(db, 'equipment', docId);
                        const prodSnap = await getDoc(prodRef);
                        if (prodSnap.exists()) {
                            const currentStock = prodSnap.data().stock || 0;
                            if (currentStock >= qty) {
                                await updateDoc(prodRef, { stock: currentStock - qty });
                            }
                        }

                        // Build order data
                        const transactionId = `${docId.substring(0, 3).toUpperCase()}-${Math.random().toString(36).substr(2, 3).toUpperCase()}`;
                        const orderData = {
                            productId: docId,
                            name: name,
                            quantity: qty,
                            rentalDays: days,
                            rentalStart: urlParams.get('rentalStart'),
                            rentalEnd: urlParams.get('rentalEnd'),
                            totalPrice: totalPrice.toFixed(2),
                            deliveryAddress: address,
                            deliveryLocation: deliveryLocation ? {
                                latitude: deliveryLocation.latitude,
                                longitude: deliveryLocation.longitude,
                            } : null,
                            orderTime: new Date().toISOString(),
                            transactionId: transactionId,
                            status: 'Processing',
                            createdAt: new Date().toISOString()
                        };

                        // Save to user history
                        await setDoc(userRef, { history: arrayUnion(orderData) }, { merge: true });

                    } else if (type === 'service') {
                        // Update Schedule Pax
                        const srvRef = doc(db, 'services', docId);
                        const srvSnap = await getDoc(srvRef);
                        if (srvSnap.exists()) {
                            const data = srvSnap.data();
                            const sched = data.schedule || [];
                            const updatedSched = sched.map(s => {
                                if (s.date === urlParams.get('bookingDate') && `${s.from} - ${s.to}` === urlParams.get('timeSlot')) {
                                    return { ...s, pax: Math.max((s.pax || 1) - 1, 0) };
                                }
                                return s;
                            });
                            await updateDoc(srvRef, { schedule: updatedSched });
                        }

                        // Build booking data
                        const bookingData = {
                            serviceId: docId,
                            title: name,
                            description: urlParams.get('notes') || '',
                            bookingDate: urlParams.get('bookingDate'),
                            timeSlot: urlParams.get('timeSlot'),
                            price: price,
                            createdAt: new Date().toISOString()
                        };

                        // Save to user bookings
                        await setDoc(userRef, { booking: arrayUnion(bookingData) }, { merge: true });
                    }
                })();

                await Promise.race([transactionPromise, timeoutPromise]);

                // Redirect to Delivery/History page upon success
                btn.innerText = "Success! Redirecting...";
                setTimeout(() => {
                    // Try primary redirect
                    window.location.href = '/app/delivery.html';
                    
                    // Fallback redirect after a delay if needed
                    setTimeout(() => {
                        if (window.location.pathname !== '/app/delivery.html') {
                            window.location.replace('/app/delivery.html');
                        }
                    }, 1000);
                }, 500);

            } catch (err) {
                console.error('Transaction error:', err);
                const errorMsg = err.message.includes('timeout')
                    ? 'Transaction is taking too long. Please check your connection and try again.'
                    : err.message;
                alert("Failed to process transaction: " + errorMsg);
                btn.innerHTML = `Complete Transaction <i class="mdi mdi-shield-check"></i>`;
                btn.disabled = false;
            }
        });

    </script>
</body>

</html>
