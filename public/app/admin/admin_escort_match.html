<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchmaking</title>
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Premium Dark Theme - Restored Style */
            --bg-base: #F8FAFC;
            --bg-card: #FFFFFF;
            --primary: #81ade7;
            --primary-glow: rgba(129, 173, 231, 0.4);
            --text-main: #1E293B;
            --text-dim: #64748B;
            --accent: #62b8ea;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: rgba(0, 0, 0, 0.05);
            --glass: #FFFFFF;
            --surface-hover: #F1F5F9;
            --indigo-600: #818cf8;
            --rose-600: #fb7185;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            background-image: radial-gradient(at 0% 0%, rgba(129, 173, 231, 0.08) 0px, transparent 45%), radial-gradient(at 100% 100%, rgba(98, 184, 234, 0.08) 0px, transparent 45%);
        }

        /* Glass Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-base);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Navigation */
        nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            /* background: linear-gradient(135deg, var(--primary), var(--accent)); */
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logout-btn {
            background: var(--surface-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logout-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        /* Stats Bar - PREMIUM STYLING */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
        }

        .stat-data .label {
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .stat-data .value {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2.5rem;
        }

        @media (max-width: 1100px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Columns */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .data-panel {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Section Containers */
        .glass-box {
            background: var(--glass);
            border-radius: 28px;
            border: 1px solid var(--border);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .box-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .box-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Styling */
        .form-body {
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.6rem;
        }

        .input-dark {
            width: 100%;
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .input-dark:focus {
            outline: none;
            border-color: var(--primary);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .time-range {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            width: 100%;
        }

        .time-range .input-dark {
            flex: 1 1 0;
            width: 0;
            min-width: 0;
        }

        .btn-premium {
            width: 100%;
            padding: 1rem;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-indigo-outline {
            border-color: var(--indigo-600);
            color: var(--indigo-600);
            background: transparent;
        }

        .btn-indigo-outline:hover {
            background: var(--indigo-600);
            color: #FFFFFF;
        }

        .btn-rose-outline {
            border-color: var(--rose-600);
            color: var(--rose-600);
            background: transparent;
        }

        .btn-rose-outline:hover {
            background: var(--rose-600);
            color: #FFFFFF;
        }

        /* Card Listings - PREMIUM GRID */
        .entry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
        }

        .entry-card {
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.25rem;
            transition: all 0.3s;
        }

        .entry-card:hover {
            border-color: var(--primary);
            background: #F1F5F9;
            transform: translateY(-3px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-circle {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e2e8f0, #f8fafc);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border: 1px solid var(--border);
        }

        .card-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
        }

        .card-sub {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .badge-glass {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            backdrop-filter: blur(5px);
        }

        .badge-available,
        .badge-pending {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-matched {
            color: var(--warning);
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-confirmed {
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-completed {
            color: var(--text-dim);
            background: var(--surface-hover);
            border: 1px solid var(--border);
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.25rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .detail-item i {
            width: 16px;
            color: var(--primary);
        }

        .card-actions {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            display: flex;
            justify-content: flex-end;
        }

        .btn-sm {
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid var(--primary);
            background: transparent;
            color: var(--primary);
            transition: all 0.2s;
        }

        .btn-sm:hover {
            background: var(--primary);
            color: #FFFFFF;
        }

        /* Modals - RESTORED PREMIUM GLASS */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            width: 100%;
            max-width: 550px;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
        }

        .modal-header h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .modal-header p {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .option-item {
            background: #F8FAFC;
            border: 1px solid var(--border);
            padding: 1.25rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:hover {
            border-color: var(--primary);
            background: var(--surface-hover);
        }

        .option-item.occupied {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Rating Stars */
        .star-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
        }

        .star-box {
            font-size: 2.5rem;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s;
        }

        .star-box.active {
            color: var(--warning);
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }

        /* Utility */
        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1.5rem; color: var(--text-dim); font-weight: 600;">Loading...</p>
    </div>

    <div class="container">
        <section id="dashboard-view">
            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(129, 173, 231, 0.1); color: var(--primary);">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div class="stat-data">
                        <div class="label">Active Providers</div>
                        <div class="value" id="stat-vol">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--warning);">
                        <i class="fas fa-hourglass-half"></i>
                    </div>
                    <div class="stat-data">
                        <div class="label">Total Requests</div>
                        <div class="value" id="stat-pending">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">
                        <i class="fas fa-link"></i>
                    </div>
                    <div class="stat-data">
                        <div class="label">Active Matches</div>
                        <div class="value" id="stat-matches">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(98, 184, 234, 0.1); color: var(--accent);">
                        <i class="fas fa-check-double"></i>
                    </div>
                    <div class="stat-data">
                        <div class="label">Success Rate</div>
                        <div class="value" id="stat-rate">0%</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1); color: var(--danger);">
                        <i class="fas fa-inbox"></i>
                    </div>
                    <div class="stat-data">
                        <div class="label">Pending Queue</div>
                        <div class="value" id="stat-queue">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">
                        <i class="fas fa-clipboard-check"></i>
                    </div>
                    <div class="stat-data">
                        <div class="label">Jobs Completed</div>
                        <div class="value" id="stat-completed">0</div>
                    </div>
                </div>


            </div>

            <div class="dashboard-grid">
                <!-- Sidebar Controls -->
                <div class="control-panel">
                    <div class="glass-box">
                        <div class="box-header" style="background: rgba(129, 140, 248, 0.05);">
                            <h2><i class="fas fa-plus-circle" style="color: var(--indigo-600);"></i> Provider Entry</h2>
                        </div>
                        <div class="form-body">
                            <form id="vol-form">
                                <div class="form-group" style="display: grid; grid-template-columns: 1fr; gap: 12px;">
                                    <div>
                                        <label>Escort Date</label>
                                        <input type="date" class="input-dark" id="vol-date" required>
                                    </div>
                                    <div>
                                        <label>Window</label>
                                        <div class="time-range">
                                            <input type="time" class="input-dark" id="vol-start" required>
                                            <input type="time" class="input-dark" id="vol-end" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Location</label>
                                    <input type="text" class="input-dark" id="vol-location"
                                        placeholder="Hospital, area, or facility" required>
                                </div>
                                <div class="form-group"
                                    style="display: grid; grid-template-columns: 1fr 2fr; gap: 12px;">
                                    <div>
                                        <label>Location Radius Furthest Travelled (KM)</label>
                                        <input type="number" class="input-dark" id="vol-radius" placeholder="5" value="5">
                                    </div>
                                    <div>
                                        <label>Contact Phone</label>
                                        <input type="tel" class="input-dark" id="vol-phone"
                                            placeholder="Provider number">
                                    </div>
                                </div>
                                <button type="submit" class="btn-premium btn-indigo-outline">Register
                                    Availability</button>
                            </form>
                        </div>
                    </div>

                    <div class="glass-box">
                        <div class="box-header" style="background: rgba(251, 113, 133, 0.05);">
                            <h2><i class="fas fa-heart" style="color: var(--rose-600);"></i> Support Request</h2>
                        </div>
                        <div class="form-body">
                            <form id="req-form">
                                <div class="form-group" style="display: grid; grid-template-columns: 1fr; gap: 12px;">
                                    <div>
                                        <label>Date</label>
                                        <input type="date" class="input-dark" id="req-date" required>
                                    </div>
                                    <div>
                                        <label>Time Window</label>
                                        <div class="time-range">
                                            <input type="time" class="input-dark" id="req-start" required>
                                            <input type="time" class="input-dark" id="req-end" required>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Hospital / Clinic</label>
                                    <input type="text" class="input-dark" id="req-hospital"
                                        placeholder="Name of health facility" required>
                                </div>
                                <div class="form-group">
                                    <label>Appointment Info</label>
                                    <input type="text" class="input-dark" id="req-appointment-info"
                                        placeholder="e.g. back pain, joint pain" required>
                                </div>
                                <div class="form-group"
                                    style="display: grid; grid-template-columns: 1fr 2fr; gap: 12px;">
                                    <div>
                                        <label>Patient Age</label>
                                        <input type="number" class="input-dark" id="req-age" placeholder="70">
                                    </div>
                                    <div>
                                        <label>Contact Phone</label>
                                        <input type="tel" class="input-dark" id="req-phone" placeholder="Client number">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Medical Details / Notes / Constraints</label>
                                    <textarea class="input-dark" id="req-medical" style="height: 60px; resize: none;"
                                        placeholder="Mobility, medications..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Emergency Contact Number</label>
                                    <input type="tel" class="input-dark" id="req-emergency-phone" placeholder="Emergency contact number">
                                </div>
                                <div class="form-group">
                                    <label>Required Certification</label>
                                    <select class="input-dark" id="req-volunteer-certification"></select>
                                    <div style="margin-top:8px;font-size:0.75rem;color:var(--text-dim);font-weight:600;" id="req-certification-helper">
                                        Selected certification will be shared with volunteers.
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Instructions</label>
                                    <textarea class="input-dark" id="req-instructions" style="height: 60px; resize: none;"
                                        placeholder="Specific needs..."></textarea>
                                </div>
                                <button type="submit" class="btn-premium btn-rose-outline">Queue Request</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Data Feeds -->
                <div class="data-panel">
                    <div class="glass-box">
                        <div class="box-header">
                            <h2><i class="fas fa-user-check"></i> Available Providers</h2>
                            <div style="display: flex; gap: 10px;">
                                <div style="position: relative;">
                                    <input type="text" id="vol-search" class="input-dark"
                                        style="padding-left: 35px; width: 220px; font-size: 0.8rem;"
                                        placeholder="Search names...">
                                    <i class="fas fa-search"
                                        style="position: absolute; left: 12px; top: 50%; translate: 0 -50%; font-size: 0.8rem; color: var(--text-dim);"></i>
                                </div>
                                <button class="logout-btn" style="padding: 0.5rem;"
                                    onclick="exportData('volunteers')"><i class="fas fa-file-csv"></i></button>
                            </div>
                        </div>
                        <div id="vol-grid" class="entry-grid">
                            <!-- Cards Load Here -->
                        </div>
                    </div>

                    <div class="glass-box">
                        <div class="box-header">
                            <h2><i class="fas fa-clipboard-list"></i> Pending Care Queue</h2>
                            <div style="display: flex; gap: 10px;">
                                <button class="btn-sm" style="background: var(--primary); color: #FFFFFF;"
                                    onclick="autoMatchAll()">
                                    <i class="fas fa-magic"></i> Auto-Match
                                </button>
                                <button class="logout-btn" style="padding: 0.5rem;" onclick="exportData('requests')">
                                    <i class="fas fa-file-csv"></i>
                                </button>
                            </div>
                        </div>
                        <div id="req-grid" class="entry-grid">
                            <!-- Cards Load Here -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Match Overlay -->
    <div id="match-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-link"></i> Smart Match</h3>
                <p id="match-subtitle"></p>
            </div>
            <div id="match-options" class="modal-options"></div>
            <button class="btn-premium" style="background: rgba(255,255,255,0.05); color: var(--text-main);"
                onclick="closeModal('match-modal')">Discard</button>
        </div>
    </div>

    <!-- Rating Overlay -->
    <div id="rate-modal" class="modal-overlay">
        <div class="modal" style="text-align: center;">
            <div class="modal-header">
                <h3>Close Interaction</h3>
                <p id="rate-subtitle"></p>
            </div>
            <div class="star-row">
                <i class="fas fa-star star-box" data-val="1"></i>
                <i class="fas fa-star star-box" data-val="2"></i>
                <i class="fas fa-star star-box" data-val="3"></i>
                <i class="fas fa-star star-box" data-val="4"></i>
                <i class="fas fa-star star-box" data-val="5"></i>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn-premium" style="background: var(--success); color: #FFFFFF;"
                    id="confirm-rate-btn">Finalize & Log</button>
                <button class="btn-premium"
                    style="background: transparent; border-color: var(--border); color: var(--text-dim);"
                    onclick="closeModal('rate-modal')">Back</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfigResponse = await fetch('/api/firebase-config');
        if (!firebaseConfigResponse.ok) {
            throw new Error('Firebase client config is missing.');
        }

        const firebaseConfig = await firebaseConfigResponse.json();

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // SYSTEM STATE
        let volunteers = [];
        let requests = [];
        let volSearch = '';
        let activeRatingRequest = null;
        let selectedRating = 0;
        let certificationCatalog = [];

        const CERT_CATALOG_PATH = 'escort/certifications/catalog';
        const reqCertSelect = document.getElementById('req-volunteer-certification');
        const reqCertHelper = document.getElementById('req-certification-helper');

        const loader = document.getElementById('loader');
        const dashboardView = document.getElementById('dashboard-view');

        // INITIALIZATION
        dashboardView.style.display = 'block';
        await loadCertificationCatalog();
        syncData();
        hideLoader();

        async function loadCertificationCatalog() {
            const snap = await getDocs(collection(db, CERT_CATALOG_PATH));
            certificationCatalog = snap.docs
                .map((d) => ({ id: d.id, ...d.data() }))
                .filter((item) => item.active !== false)
                .sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
            renderCertificationCatalog();
        }

        function renderCertificationCatalog() {
            reqCertSelect.innerHTML = '';
            if (!certificationCatalog.length) {
                reqCertSelect.innerHTML = '<option value=\"\">No certification types configured by admin</option>';
                reqCertSelect.disabled = true;
                reqCertHelper.textContent = 'Configure certification types in Escort Certs first.';
                return;
            }

            reqCertSelect.disabled = false;
            certificationCatalog.forEach((item) => {
                const option = document.createElement('option');
                option.value = item.id;
                option.textContent = item.name || 'Certification';
                reqCertSelect.appendChild(option);
            });
            updateCertHelper();
        }

        function updateCertHelper() {
            const selected = certificationCatalog.find((item) => item.id === reqCertSelect.value);
            reqCertHelper.textContent = selected?.description || 'Selected certification will be shared with volunteers.';
        }

        reqCertSelect.addEventListener('change', updateCertHelper);

        // DATA SYNC
        function syncData() {
            onSnapshot(collection(db, 'escort', 'availability', 'entries'), (snap) => {
                volunteers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderEntries();
            });
            onSnapshot(collection(db, 'escort', 'request', 'entries'), (snap) => {
                requests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderEntries();
            });
        }

        // ENTRY SUBMISSIONS
        document.getElementById('vol-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                providerId: auth?.currentUser?.uid ?? 'guest',
                providerEmail: auth?.currentUser?.email ?? 'guest',
                date: document.getElementById('vol-date').value,
                fromTime: document.getElementById('vol-start').value,
                toTime: document.getElementById('vol-end').value,
                location: document.getElementById('vol-location').value,
                serviceRadiusKm: Number(document.getElementById('vol-radius').value) || 5,
                locationRadiusKm: Number(document.getElementById('vol-radius').value) || 5,
                maxPax: 1,
                contactPhone: document.getElementById('vol-phone').value,
                notes: '',
                createdAt: new Date().toISOString(),
                status: 'available',
                patientConfirmed: false,
                volunteerConfirmed: false,
                patientCompleted: false,
                volunteerCompleted: false
            };
            await addDoc(collection(db, 'escort', 'availability', 'entries'), data);
            e.target.reset();
        };

        document.getElementById('req-form').onsubmit = async (e) => {
            e.preventDefault();
            const selectedCertification = certificationCatalog.find((item) => item.id === reqCertSelect.value) || null;
            const data = {
                userId: auth?.currentUser?.uid ?? 'guest',
                userEmail: auth?.currentUser?.email ?? 'guest',
                date: document.getElementById('req-date').value,
                time: document.getElementById('req-start').value,
                endTime: document.getElementById('req-end').value,
                hospital: document.getElementById('req-hospital').value,
                appointmentInfo: document.getElementById('req-appointment-info').value,
                appointmentReason: document.getElementById('req-appointment-info').value,
                age: Number(document.getElementById('req-age').value) || null,
                contactPhone: document.getElementById('req-phone').value,
                emergencyContactPhone: document.getElementById('req-emergency-phone').value,
                requiredCertificationId: selectedCertification?.id || null,
                requiredCertificationName: selectedCertification?.name || null,
                volunteerRequirements: selectedCertification?.name || '',
                medicalDetails: document.getElementById('req-medical').value,
                instructions: document.getElementById('req-instructions').value,
                additionalNotes: document.getElementById('req-instructions').value,
                status: 'pending',
                createdAt: new Date().toISOString()
            };
            await addDoc(collection(db, 'escort', 'request', 'entries'), data);
            e.target.reset();
            updateCertHelper();
        };

        // RENDERING LOGIC
        function renderEntries() {
            updateStats();
            renderVolunteers();
            renderRequests();
        }

        function updateStats() {
            // System-wide Performance Metrics
            const uniqueProviders = new Set(volunteers.map(v => v.providerId)).size;
            const totalRequests = requests.length;
            const activeMatches = requests.filter(r => r.status === 'matched').length;
            const completedMatches = requests.filter(r => r.status === 'completed').length;
            const pendingReqs = requests.filter(r => r.status === 'pending').length;

            // Success Rate (Completed / Total)
            const rate = totalRequests ? Math.round((completedMatches / totalRequests) * 100) : 0;





            document.getElementById('stat-vol').innerText = uniqueProviders;
            document.getElementById('stat-pending').innerText = totalRequests;
            document.getElementById('stat-matches').innerText = activeMatches;
            document.getElementById('stat-rate').innerText = rate + '%';

            // New Stats
            document.getElementById('stat-queue').innerText = pendingReqs;
            document.getElementById('stat-completed').innerText = completedMatches;


        }

        function renderVolunteers() {
            const grid = document.getElementById('vol-grid');
            const sorted = volunteers.filter(v => (v.name || v.providerEmail || '').toLowerCase().includes(volSearch.toLowerCase()))
                .sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            grid.innerHTML = sorted.map(v => {
                const displayName = v.name || v.providerEmail?.split('@')[0] || 'Unknown';
                const isMatched = v.status === 'matched';
                const ratings = requests.filter(r => r.matchedProviderId === v.providerId && r.status === 'completed' && r.rating);
                const avg = ratings.length ? (ratings.reduce((sx, r) => sx + r.rating, 0) / ratings.length).toFixed(1) : null;

                return `
                    <div class="entry-card">
                        <div class="card-top">
                            <div class="card-user">
                                <div class="avatar-circle">${displayName[0]}</div>
                                <div>
                                    <div class="card-name">${displayName}</div>
                                    <div class="card-sub">${isMatched ? 'On Assignment' : 'Standby'}</div>
                                    <div style="font-size: 0.65rem; color: var(--text-dim); margin-top:2px;">ID: ${v.id}</div> 
                                </div>
                            </div>
                            <span class="badge-glass badge-${v.status}">${v.status === 'confirmed' ? 'confirmed' : (v.status === 'matched' ? 'matched' : 'available')}</span>
                        </div>
                        <div class="card-details">
                            <div class="detail-item"><i class="fas fa-calendar"></i> ${formatDate(v.date)}</div>
                            <div class="detail-item"><i class="fas fa-clock"></i> ${v.fromTime} - ${v.toTime}</div>
                            <div class="detail-item"><i class="fas fa-map-marker-alt"></i> ${v.location || 'Anywhere'} (Max ${v.maxPax || 1} Pax)</div>
                            <div class="detail-item"><i class="fas fa-phone"></i> ${v.contactPhone || 'No Phone'}</div>
                            ${avg ? `<div class="detail-item" style="color:var(--warning)"><i class="fas fa-star"></i> Provider Rating: ${avg}</div>` : ''}
                            <div class="detail-item" style="font-style: italic; opacity: 0.7;"><i class="fas fa-quote-left"></i> ${v.notes || 'No notes'}</div>
                        </div>
                        <div class="card-actions">
                             <button class="btn-sm" style="border-color:var(--danger); color:var(--danger)" onclick="deleteEntry('availability', '${v.id}')">Remove</button>
                        </div>
                    </div>
                `;
            }).join('') || '<div style="padding: 2rem; color: var(--text-dim);">No active providers logged.</div>';
        }

        function renderRequests() {
            const grid = document.getElementById('req-grid');
            const sorted = requests.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            grid.innerHTML = sorted.map(r => {
                const displayName = r.userEmail?.split('@')[0] || 'Anonymous';
                let action = '';
                if (r.status === 'confirmed') {
                    action = `<button class="btn-sm" style="border-color:var(--success); color:var(--success)" onclick="adminCompleteJob('${r.id}', '${r.matchedAvailabilityId}')">Complete Job</button>`;
                } else if (r.status === 'completed') {
                    action = `<span style="color:var(--success); font-weight:800; font-size: 0.8rem;"><i class="fas fa-check-circle"></i> Fulfilled</span>`;
                }

                return `
                    <div class="entry-card" style="${r.status === 'completed' ? 'opacity: 0.6' : ''}">
                        <div class="card-top">
                            <div class="card-user">
                                <div class="avatar-circle" style="color: var(--rose-600);"><i class="fas fa-heart"></i></div>
                                <div>
                                    <div class="card-name">${displayName}</div>
                                    <div class="card-sub">${r.hospital || 'Medical Request'}</div>
                                    <div style="font-size: 0.65rem; color: var(--text-dim); margin-top:2px;">ID: ${r.id}</div>
                                </div>
                            </div>
                            <span class="badge-glass badge-${r.status}">${r.status}</span>
                        </div>
                        <div class="card-details">
                            <div class="detail-item"><i class="fas fa-calendar-day"></i> ${formatDate(r.date)}</div>
                            <div class="detail-item"><i class="fas fa-clock"></i> ${r.time} - ${r.endTime}</div>
                            <div class="detail-item"><i class="fas fa-notes-medical"></i> ${r.appointmentReason || 'Checkup'}</div>
                             ${r.age ? `<div class="detail-item"><i class="fas fa-user-circle"></i> Age: ${r.age}</div>` : ''}
                            <div class="detail-item"><i class="fas fa-phone"></i> ${r.contactPhone || 'No Phone'}</div>
                            ${r.medicalDetails ? `<div class="detail-item"><i class="fas fa-scroll"></i> Meds: ${r.medicalDetails}</div>` : ''}
                            <div class="detail-item"><i class="fas fa-comment-dots"></i> ${r.additionalNotes || r.notes || 'Standard care requested'}</div>
                        </div>
                        <div class="card-actions" style="gap: 10px;">
                            ${action}
                             <button class="btn-sm" style="border-color:var(--danger); color:var(--danger)" onclick="deleteEntry('request', '${r.id}')">Remove</button>
                        </div>
                    </div>
                `;
            }).join('') || '<div style="padding: 2rem; color: var(--text-dim);">Queue is empty.</div>';
        }

        // INTERACTIVE LOGIC
        window.openMatchModal = (reqId) => {
            const req = requests.find(r => r.id === reqId);
            const list = document.getElementById('match-options');
            document.getElementById('match-subtitle').innerText = `Assigning support for ${req.caregiverName || req.userEmail} on ${formatDate(req.date)}`;

            // Availability Cross-check
            const matches = volunteers.filter(v => {
                if (v.date !== req.date) return false;
                return v.fromTime <= req.time && v.toTime >= req.endTime;
            });

            list.innerHTML = matches.length ? matches.map(v => {
                const occupied = v.status === 'matched';
                const displayName = v.name || v.providerEmail?.split('@')[0] || 'Unknown';
                return `
                    <div class="option-item ${occupied ? 'occupied' : ''}" onclick="confirmMatch('${req.id}', '${v.id}', '${v.providerId}', '${v.providerEmail}')">
                        <div>
                            <div style="font-weight: 800;">${displayName}</div>
                            <div style="font-size: 0.8rem; color: var(--text-dim);">${v.fromTime} - ${v.toTime}</div>
                        </div>
                        ${occupied ? '<span style="font-size:0.7rem; color:var(--danger);">Engaged</span>' : '<i class="fas fa-plus-circle" style="color: var(--primary);"></i>'}
                    </div>
                `;
            }).join('') : '<div style="text-align:center; padding: 2rem; color: var(--text-dim);">No overlapping provider windows found for this request.</div>';

            document.getElementById('match-modal').style.display = 'flex';
        };

        window.confirmMatch = async (reqId, availId, providerId, providerEmail) => {
            // Update Request
            await updateDoc(doc(db, 'escort', 'request', 'entries', reqId), {
                status: 'matched',
                matchedAvailabilityId: availId,
                matchedProviderId: providerId,
                matchedProviderName: providerEmail,
                matchMode: 'manual',
                manualOverride: true,
                manualLock: true,
                manualReason: 'Admin manual override'
            });
            // Update Availability
            await updateDoc(doc(db, 'escort', 'availability', 'entries', availId), {
                status: 'matched',
                matchedRequestId: reqId,
                matchedUserId: requests.find(r => r.id === reqId)?.userId,
                matchMode: 'manual',
                manualOverride: true,
                manualLock: true,
                manualReason: 'Admin manual override'
            });
            closeModal('match-modal');
        };

        window.openRateModal = (reqId) => {
            activeRatingRequest = requests.find(r => r.id === reqId);
            const vol = volunteers.find(v => v.id === activeRatingRequest.matchedAvailabilityId);
            const displayName = vol?.name || activeRatingRequest.matchedProviderName?.split('@')[0] || 'the provider';
            document.getElementById('rate-subtitle').innerText = `How would you rate ${displayName}'s service for ${activeRatingRequest.caregiverName || activeRatingRequest.userEmail}?`;
            document.getElementById('rate-modal').style.display = 'flex';
            resetRating();
        };

        window.adminCompleteJob = async (reqId, availId) => {
            if (confirm('Manually mark this assignment as COMPLETED? Both parties will be notified.')) {
                try {
                    await updateDoc(doc(db, 'escort', 'request', 'entries', reqId), { status: 'completed' });
                    await updateDoc(doc(db, 'escort', 'availability', 'entries', availId), { status: 'completed' });
                    alert("Job status updated to completed.");
                } catch (err) {
                    alert("Error: " + err.message);
                }
            }
        };

        // RATING UI
        document.querySelectorAll('.star-box').forEach(s => {
            s.onclick = () => {
                selectedRating = parseInt(s.dataset.val);
                document.querySelectorAll('.star-box').forEach(st => st.classList.toggle('active', parseInt(st.dataset.val) <= selectedRating));
            };
        });

        function resetRating() {
            selectedRating = 0;
            document.querySelectorAll('.star-box').forEach(s => s.classList.remove('active'));
        }

        // UTILS
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.deleteEntry = async (type, id) => {
            if (confirm('Permanently scrub this record?')) {
                const path = type === 'availability' ? 'escort/availability/entries' : 'escort/request/entries';
                await deleteDoc(doc(db, path, id));
            }
        };

        document.getElementById('vol-search').oninput = (e) => {
            volSearch = e.target.value;
            renderVolunteers();
        };

        function formatDate(s) {
            const d = new Date(s);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function hideLoader() {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.visibility = 'hidden', 500);
        }

        window.exportData = (type) => {
            const data = type === 'volunteers' ? volunteers : requests;
            if (!data.length) return;
            const link = document.createElement('a');
            const csv = "data:text/csv;charset=utf-8," + [Object.keys(data[0]).join(','), ...data.map(r => Object.values(r).join(','))].join('\n');
            link.href = encodeURI(csv);
            link.download = `${type}_export_${Date.now()}.csv`;
            link.click();
        };

        // PARSE TIME HELPER
        function parseTime(timeStr) {
            if (!timeStr) return 0;
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours * 60 + minutes;
        }

        // AUTO-MATCH ALL LOGIC (Matching matchingService.ts)
        window.autoMatchAll = async () => {
            const pendingReqs = requests.filter(r => r.status === 'pending');
            const availableVols = volunteers.filter(v => v.status === 'available');

            if (!pendingReqs.length || !availableVols.length) {
                alert("No pending requests or available providers found.");
                return;
            }

            let matchCount = 0;
            for (const req of pendingReqs) {
                const reqStart = parseTime(req.time);
                const reqEnd = req.endTime ? parseTime(req.endTime) : reqStart + 60;

                // Find first available volunteer for the same date and overlapping time
                const match = availableVols.find(v => {
                    if (v.status !== 'available') return false; // Skip if already claimed in this loop
                    if (v.date !== req.date) return false;

                    const vStart = parseTime(v.fromTime);
                    const vEnd = parseTime(v.toTime);

                    return reqStart >= vStart && reqEnd <= vEnd;
                });

                if (match) {
                    // Execute Match
                    await window.confirmMatch(req.id, match.id, match.providerId, match.providerEmail);
                    match.status = 'matched'; // Mark as claimed for this run
                    matchCount++;
                }
            }

            alert(`Auto-match complete! Successfully linked ${matchCount} pair(s).`);
        };
    </script>
</body>

</html>
