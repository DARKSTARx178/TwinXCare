<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - My Bookings</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .container {
            padding: 20px 20px 100px;
        }

        .header-section {
            margin-top: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .header {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .empty-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            text-align: center;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: rgba(129, 173, 231, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            font-size: 40px;
        }

        .card {
            padding: 24px;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 20px;
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            flex: 1;
            margin-right: 10px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 100px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .info-row {
            display: flex;
            margin-bottom: 20px;
        }

        .info-item {
            flex: 1;
        }

        .info-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .description-box {
            padding: 16px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.02);
        }

        .description {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-section">
            <div class="header">My Bookings</div>
            <div class="subtitle">Active and upcoming appointments</div>
        </div>

        <div id="bookings-list">
            <div style="text-align: center; color: var(--text-dim); padding: 40px;">Fetching bookings...</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="/app/index.html" class="nav-item">
                <i class="mdi mdi-home"></i>
                <span>Home</span>
            </a>
            <a href="/app/explore.html" class="nav-item">
                <i class="mdi mdi-compass-outline"></i>
                <span>Equipment</span>
            </a>
            <a href="/app/escorts.html" class="nav-item">
                <i class="mdi mdi-shield-account-outline"></i>
                <span>Escorts</span>
            </a>
            <a href="/app/delivery.html" class="nav-item active">
                <i class="mdi mdi-truck-delivery-outline"></i>
                <span>History</span>
            </a>
            <a href="/app/settings.html" class="nav-item">
                <i class="mdi mdi-cog-outline"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc } from '/app/firebase.js';

        const listContainer = document.getElementById('bookings-list');

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                listContainer.innerHTML = '<div class="empty-container"><div class="empty-icon">🔐</div><div style="color:var(--text-dim);font-weight:600;">Please login to view bookings</div></div>';
                return;
            }

            try {
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const bookings = userSnap.data().booking || [];
                    if (bookings.length === 0) {
                        listContainer.innerHTML = '<div class="empty-container"><div class="empty-icon">📅</div><div style="color:var(--text-dim);font-weight:600;">No bookings found yet.</div><div style="color:var(--text-dim);font-size:12px;margin-top:8px;">Your scheduled services will appear here.</div></div>';
                    } else {
                        listContainer.innerHTML = bookings.map(item => `
              <div class="card">
                <div class="card-header">
                  <div class="card-title">${item.title}</div>
                  <div class="status-badge">CONFIRMED</div>
                </div>
                <div class="info-row">
                  <div class="info-item">
                    <div class="info-label">DATE</div>
                    <div class="info-value">${item.bookingDate}</div>
                  </div>
                  <div class="info-item">
                    <div class="info-label">TIME</div>
                    <div class="info-value">${item.timeSlot}</div>
                  </div>
                </div>
                <div class="description-box">
                  <div class="description">${item.description}</div>
                </div>
              </div>
            `).join('');
                    }
                }
            } catch (e) {
                console.error(e);
                listContainer.innerHTML = '<div style="color:red;padding:20px;text-align:center;">Error loading bookings</div>';
            }
        });
    </script>
</body>

</html>
