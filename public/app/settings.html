<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Settings</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
</head>

<body>
    <div class="top-header">
        <a href="/app/profile.html" class="profile-trigger">
            <i class="mdi mdi-account-circle-outline"></i>
        </a>
    </div>

    <main class="fade-in">
        <div class="section-title">
            Settings
        </div>

        <!-- User Profile Header -->
        <div class="row" style="margin-bottom: 30px;">
            <div style="display: flex; align-items: center; gap: 20px; padding: 0 10px; width: 100%;">
                <div id="user-avatar"
                    style="width: 80px; height: 80px; border-radius: 40px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: white;">
                    ?
                </div>
                <div style="flex: 1;">
                    <div id="user-name" style="font-size: 1.4rem; font-weight: 800;">Guest User</div>
                    <div style="color: var(--text-dim); font-size: 0.95rem;">Not logged in</div>
                </div>
            </div>
        </div>

        <!-- Settings Groups -->
        <div class="settings-group">
            <div class="settings-item">
                <div class="settings-item-left">
                    <div class="settings-icon">
                        <i class="mdi mdi-translate"></i>
                    </div>
                    <div style="font-weight: 600;">Language</div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="color: var(--text-dim); font-size: 0.9rem;">English</span>
                    <i class="mdi mdi-chevron-right" style="color: var(--text-dim); font-size: 24px;"></i>
                </div>
            </div>
            <div class="settings-item">
                <div class="settings-item-left">
                    <div class="settings-icon">
                        <i class="mdi mdi-white-balance-sunny"></i>
                    </div>
                    <div style="font-weight: 600;">App Theme</div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="color: var(--text-dim); font-size: 0.9rem;">Light</span>
                    <i class="mdi mdi-chevron-right" style="color: var(--text-dim); font-size: 24px;"></i>
                </div>
            </div>
            <div class="settings-item">
                <div class="settings-item-left">
                    <div class="settings-icon">
                        <i class="mdi mdi-eye"></i>
                    </div>
                    <div style="font-weight: 600;">Accessibility</div>
                </div>
                <i class="mdi mdi-chevron-right" style="color: var(--text-dim); font-size: 24px;"></i>
            </div>
        </div>
        <!-- Admin Group (Visible to admins only) -->
        <div class="settings-group" id="admin-group" style="display: none; border: 1px solid var(--primary-glow);">
            <a href="/app/admin/index.html" class="settings-item" style="text-decoration: none; color: inherit;">
                <div class="settings-item-left">
                    <div class="settings-icon" style="background: var(--primary-glow); color: var(--primary);">
                        <i class="mdi mdi-shield-crown-outline"></i>
                    </div>
                    <div style="font-weight: 700; color: var(--text);">Admin Portal</div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="color: var(--primary); font-size: 0.8rem; font-weight: 800;">MANAGEMENT</span>
                    <i class="mdi mdi-chevron-right" style="color: var(--primary); font-size: 24px;"></i>
                </div>
            </a>
        </div>

        <div class="settings-group" id="logout-btn-wrap" style="display: none;">
            <a href="/app/logout.html" class="settings-item" style="text-decoration: none;">
                <div class="settings-item-left">
                    <div class="settings-icon" style="background: rgba(255, 79, 79, 0.1); color: var(--danger);">
                        <i class="mdi mdi-logout"></i>
                    </div>
                    <div style="font-weight: 600; color: var(--danger);">Log Out</div>
                </div>
            </a>
        </div>

        <div id="app-version-footer" style="text-align: center; color: var(--text-dim); font-size: 0.8rem; margin: 40px 0;">
            TwinXCare v... Alpha Web<br>
            © 2026 TwinXCare.
        </div>

    </main>

    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="/app/index.html" class="nav-item">
                <i class="mdi mdi-home"></i>
                <span>Home</span>
            </a>
            <a href="/app/explore.html" class="nav-item">
                <i class="mdi mdi-compass-outline"></i>
                <span>Equipment</span>
            </a>
            <a href="/app/escorts.html" class="nav-item">
                <i class="mdi mdi-shield-account-outline"></i>
                <span>Escorts</span>
            </a>
            <a href="/app/delivery.html" class="nav-item">
                <i class="mdi mdi-truck-delivery-outline"></i>
                <span>History</span>
            </a>
            <a href="/app/settings.html" class="nav-item active">
                <i class="mdi mdi-cog-outline"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { auth, db, doc, getDoc, onAuthStateChanged } from '/app/firebase.js';
        import { Analytics } from "@vercel/analytics/next"

        const userNameEl = document.getElementById('user-name');
        const userAvatarEl = document.getElementById('user-avatar');
        const logoutBtnWrap = document.getElementById('logout-btn-wrap');
        const appVersionFooter = document.getElementById('app-version-footer');

        (async () => {
            try {
                const res = await fetch('/api/app-version');
                const data = await res.json();
                if (res.ok && data?.version && appVersionFooter) {
                    appVersionFooter.innerHTML = `TwinXCare v${data.version} Alpha Web<br>© 2026 TwinXCare.`;
                }
            } catch (e) { }
        })();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                logoutBtnWrap.style.display = 'block';
                userNameEl.innerText = user.email; // fallback

                try {
                    const userRef = doc(db, 'users', user.uid);
                    const userSnap = await getDoc(userRef);
                    if (userSnap.exists()) {
                        const data = userSnap.data();
                        const name = data.username || data.name || user.email.split('@')[0];
                        userNameEl.innerText = name;
                        userAvatarEl.innerText = name.charAt(0).toUpperCase();
                        userNameEl.nextElementSibling.innerText = "Manage your account";

                        if (data.role === 'admin') {
                            document.getElementById('admin-group').style.display = 'block';
                        }
                    }
                } catch (e) { }
            } else {
                logoutBtnWrap.style.display = 'none';
                userNameEl.innerText = 'Guest User';
                userNameEl.nextElementSibling.innerText = "Not logged in";
                userAvatarEl.innerText = '?';
            }
        });
    </script>
</body>

</html>
