<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Management — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="logo"><div class="logo-icon"><img src="../assets/images/logo_all-white.png" alt="Logo"></div><h1>TwinXCare</h1></a>
    <div class="nav-links"><a href="index.html" class="nav-link">App Home</a><a href="../index.html" class="nav-link">Main Site</a></div>
  </div>
</nav>
<main class="container" style="padding:2rem 1rem;">
  <section style="max-width:900px;margin:12px auto;">
    <div style="text-align:center;margin-bottom:12px;">
      <h2>Account Security</h2>
      <p style="color:var(--text-dim)">Administrative User & Password Management (demo)</p>
    </div>

    <div style="max-width:720px;margin:0 auto;background:var(--bg-soft);padding:16px;border-radius:16px;">
      <label style="display:block;color:var(--text-dim);">Admin Username</label>
      <input id="adminUser" placeholder="admin" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;">

      <label style="display:block;color:var(--text-dim);">Admin Password</label>
      <input id="adminPass" placeholder="••••••" type="password" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;">

      <div style="display:flex;gap:10px;">
        <button id="authorizeBtn" class="btn-app">Authorize & Load Users</button>
        <div id="pwStatus" style="align-self:center;color:var(--text-dim)"></div>
      </div>
    </div>

    <div id="usersSection" style="margin-top:18px;display:none;max-width:720px;margin-left:auto;margin-right:auto;">
      <h3 style="margin-top:0">User Directory</h3>
      <div id="userList"></div>

      <div id="managePanel" style="margin-top:12px;display:none">
        <label style="display:block;color:var(--text-dim)">New Password for <span id="selectedUser"></span></label>
        <input id="newPassword" placeholder="Enter new password" type="password" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;">
        <div style="display:flex;gap:10px">
          <button id="resetPwBtn" class="btn-app">Reset Password</button>
          <button id="deleteUserBtn" class="btn-app" style="background:#fff;color:#ef4444;border:1px solid #ef4444">Delete User</button>
        </div>
        <div id="manageMsg" style="margin-top:10px;color:var(--text-dim)"></div>
      </div>

    </div>

    <p style="text-align:center;margin-top:18px"><a href="index.html">Back to app home</a></p>
  </section>

  <script>
    const samples = ['admin','john','jane','caregiver'];
    let loadedUsers = [];
    let selected = '';
    document.getElementById('authorizeBtn').addEventListener('click', ()=>{
      const u=document.getElementById('adminUser').value.trim();
      const p=document.getElementById('adminPass').value.trim();
      const st=document.getElementById('pwStatus'); st.textContent='';
      if(!u||!p){ st.textContent='Admin credentials required.'; return; }
      st.textContent='Authorizing...'; setTimeout(()=>{
        loadedUsers = samples.slice(); document.getElementById('usersSection').style.display='block'; renderUsers(); st.textContent='Loaded users (demo)';
      },700);
    });

    function renderUsers(){
      const list = document.getElementById('userList'); list.innerHTML='';
      loadedUsers.forEach(name=>{
        const btn = document.createElement('button'); btn.textContent=name; btn.className='btn-app-outline'; btn.style.margin='6px';
        btn.addEventListener('click', ()=>{ selected=name; document.getElementById('selectedUser').textContent=selected; document.getElementById('managePanel').style.display='block'; });
        list.appendChild(btn);
      });
    }

    document.getElementById('resetPwBtn').addEventListener('click', ()=>{
      const newPw=document.getElementById('newPassword').value.trim(); const msg=document.getElementById('manageMsg');
      if(!selected||!newPw){ msg.textContent='Select user and enter new password.'; return; }
      msg.textContent='Resetting password (demo)...'; setTimeout(()=>{ msg.textContent=`Password reset for ${selected} (demo).`; document.getElementById('newPassword').value=''; },700);
    });

    document.getElementById('deleteUserBtn').addEventListener('click', ()=>{
      if(!selected) return; if(!confirm(`Delete ${selected}?`)) return; loadedUsers = loadedUsers.filter(u=>u!==selected); selected=''; document.getElementById('managePanel').style.display='none'; renderUsers(); document.getElementById('manageMsg').textContent='User deleted (demo)';
    });
  </script>
</main>
<footer>
  <div class="container"><div class="footer-bottom">&copy; 2026 TwinXCare</div></div>
</footer>
</body>
</html>
