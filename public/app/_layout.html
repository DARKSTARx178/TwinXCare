<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>_layout — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<main style="min-height:70vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px;">
  <div style="width:120px;height:120px;border-radius:40px;display:flex;align-items:center;justify-content:center;background:var(--bg-card);box-shadow:var(--shadow-sm);">
    <img src="../assets/images/logo_all-white.png" alt="Logo" style="width:70px;height:70px;object-fit:contain;filter:grayscale(1) brightness(0) invert(1)">
  </div>
  <h2 style="margin-top:18px">TwinXCare</h2>
  <p style="color:var(--text-dim)">Preparing app…</p>
  <div style="width:60%;max-width:320px;margin-top:18px;">
    <div style="height:6px;background:#F1F5F9;border-radius:4px;overflow:hidden">
      <div id="layoutProgress" style="height:100%;width:0%;background:var(--primary);transition:width 1s ease"></div>
    </div>
  </div>
</main>

<script>
  // Mimic the native RootLayout flow: quick splash then navigate to app root (tabs)
  setTimeout(()=>{ document.getElementById('layoutProgress').style.width='60%'; },150);
  setTimeout(()=>{ document.getElementById('layoutProgress').style.width='100%'; },700);
  setTimeout(()=>{ window.location.href='(tabs)/index.html'; },1200);
</script>
</body>
</html>
