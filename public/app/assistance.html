<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Assistance</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 20px;
        }

        .back-button {
            position: fixed;
            top: 50px;
            left: 20px;
            z-index: 10;
            padding: 8px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.03);
            color: var(--text);
            text-decoration: none;
        }

        .card {
            padding: 30px;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: rgba(129, 173, 231, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: var(--primary);
            font-size: 32px;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-dim);
            margin-bottom: 25px;
            line-height: 1.4;
            font-weight: 500;
        }

        .input-wrapper {
            text-align: left;
            width: 100%;
            margin-bottom: 25px;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            display: block;
        }

        .input {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            font-size: 1rem;
            background: #F1F5F9;
            min-height: 150px;
            font-weight: 500;
            outline: none;
            font-family: inherit;
            color: var(--text);
            resize: none;
            box-sizing: border-box;
        }

        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 2px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            gap: 8px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .info-box {
            display: flex;
            align-items: center;
            margin-top: 25px;
            background: rgba(129, 173, 231, 0.05);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: left;
        }

        .info-box i {
            font-size: 18px;
            color: var(--primary);
            margin-right: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-button">
            <i class="mdi mdi-arrow-left" style="font-size: 24px;"></i>
        </a>

        <div class="card">
            <div class="icon-circle">
                <i class="mdi mdi-megaphone-outline"></i>
            </div>

            <div class="title">Request Assistance</div>
            <div class="subtitle">Tell us what you need and our team will get back to you as soon as possible.</div>

            <form id="assistance-form">
                <div class="input-wrapper">
                    <label class="label">Request Details</label>
                    <textarea id="message" class="input" placeholder="Describe how we can help you today..."
                        required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="btn-submit">
                    Send Request <i class="mdi mdi-send"></i>
                </button>
            </form>

            <div class="info-box">
                <i class="mdi mdi-information-outline"></i>
                <span>Your request will be sent directly to our support coordinators.</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, doc, getDoc, collection, addDoc, serverTimestamp } from '/app/firebase.js';

        let username = 'Anonymous';
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const uDoc = await getDoc(doc(db, 'users', user.uid));
                    if (uDoc.exists()) username = uDoc.data().username || user.email;
                } catch (e) { }
            }
        });

        const form = document.getElementById('assistance-form');
        const btnSubmit = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = document.getElementById('message').value.trim();
            if (!message) return;

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = 'Sending Request...';

            try {
                await addDoc(collection(db, "requests"), {
                    username,
                    message,
                    createdAt: serverTimestamp()
                });

                /*
                // Temporarily disabled: Send email via API
                const apiBaseUrl = (window.TWINXCARE_API_BASE_URL || window.location.origin || '').replace(/\/$/, '');
                if (apiBaseUrl) {
                    await fetch(`${apiBaseUrl}/api/send-email`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message, username, type: "assistance" }),
                    });
                }
                */

                alert('Thank you! Your request has been submitted.');
                window.history.back();
            } catch (err) {
                console.error(err);
                alert(err?.message || 'Failed to submit request.');
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Send Request <i class="mdi mdi-send"></i>';
            }
        });
    </script>
</body>

</html>
