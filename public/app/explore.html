<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Explore</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#121212">
</head>

<body>

    <!-- Main Content -->
    <main class="fade-in">
        <div class="section-title">
            <i class="mdi mdi-compass" style="color: var(--primary);"></i>
            Explore Equipment
        </div>

        <input type="text" class="search-bar" placeholder="Search equipment...">

        <!-- Dummy Equipment List -->
        <div class="item-card">
            <img src="https://images.unsplash.com/photo-1594833202931-7bfa0b411707?w=400&q=80" alt="Wheelchair"
                class="item-img" style="object-fit: contain; padding: 10px;">
            <div class="item-info">
                <div class="item-brand">REHAB EQUIP</div>
                <div class="item-title">Standard Wheelchair</div>
                <div class="item-bottom">
                    <div class="item-price">$25/day</div>
                    <div class="stock-badge">12 in Stock</div>
                </div>
            </div>
        </div>

        <div class="item-card">
            <img src="https://images.unsplash.com/photo-1632832598642-187515401955?w=400&q=80" alt="Crutches"
                class="item-img" style="object-fit: contain; padding: 10px;">
            <div class="item-info">
                <div class="item-brand">MED CARE</div>
                <div class="item-title">Adjustable Crutches</div>
                <div class="item-bottom">
                    <div class="item-price">$10/day</div>
                    <div class="stock-badge">5 in Stock</div>
                </div>
            </div>
        </div>

        <div class="item-card">
            <img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=400&q=80" alt="Hospital Bed"
                class="item-img" style="object-fit: contain; padding: 10px;">
            <div class="item-info">
                <div class="item-brand">LUX MED</div>
                <div class="item-title">Premium Hospital Bed</div>
                <div class="item-bottom">
                    <div class="item-price">$80/day</div>
                    <div class="stock-badge">2 in Stock</div>
                </div>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="/app/index.html" class="nav-item">
            <i class="mdi mdi-home"></i>
            <span>Home</span>
        </a>
        <a href="/app/explore.html" class="nav-item active">
            <i class="mdi mdi-compass"></i>
            <span>Explore</span>
        </a>
        <a href="/app/services.html" class="nav-item">
            <i class="mdi mdi-car-sports"></i>
            <span>Services</span>
        </a>
        <a href="/app/delivery.html" class="nav-item">
            <i class="mdi mdi-truck-delivery"></i>
            <span>History</span>
        </a>
        <a href="/app/settings.html" class="nav-item">
            <i class="mdi mdi-cog"></i>
            <span>Settings</span>
        </a>
    </nav>

</body>

</html>
