<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="logo"><div class="logo-icon"><img src="../assets/images/logo_all-white.png" alt="Logo"></div><h1>TwinXCare</h1></a>
    <div class="nav-links"><a href="index.html" class="nav-link">App Home</a><a href="../index.html" class="nav-link">Main Site</a></div>
  </div>
</nav>
<main class="container" style="padding:2rem 1rem;">
  <h2>Login</h2>
  <p>Static placeholder for `login.tsx`. This page is a static HTML fallback for the web app.</p>
  <form style="max-width:420px;margin-top:1rem;">
    <label style="display:block;margin-bottom:8px;color:var(--text-dim);">Email</label>
    <input type="email" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;">
    <label style="display:block;margin-bottom:8px;color:var(--text-dim);">Password</label>
    <input type="password" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;">
    <button style="background:linear-gradient(135deg,var(--primary),var(--accent));color:white;padding:10px 16px;border-radius:10px;border:none;">Sign In</button>
  </form>
  <p style="margin-top:12px;"><a href="index.html">Back to app home</a></p>
</main>
<footer>
  <div class="container"><div class="footer-bottom">&copy; 2026 TwinXCare</div></div>
</footer>
</body>
</html>
