<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — TwinXCare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" class="logo"><div class="logo-icon"><img src="../assets/images/logo_all-white.png" alt="Logo"></div><h1>TwinXCare</h1></a>
    <div class="nav-links"><a href="index.html" class="nav-link">App Home</a><a href="../index.html" class="nav-link">Main Site</a></div>
  </div>
</nav>
<main class="container" style="padding:2rem 1rem;">
  <section style="max-width:480px;margin:18px auto;">
    <h2>Welcome Back</h2>
    <p style="color:var(--text-dim)">Please sign in to your TwinXCare account</p>

    <div id="loginError" style="color:#ef4444;margin-top:8px;display:none"></div>

    <form id="loginForm" style="margin-top:12px;">
      <label style="display:block;margin-bottom:8px;color:var(--text-dim);">Email Address</label>
      <input id="email" type="email" placeholder="admin@twinxcare.com" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);margin-bottom:12px;">

      <label style="display:block;margin-bottom:8px;color:var(--text-dim);">Password</label>
      <input id="password" type="password" placeholder="••••••••" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);margin-bottom:12px;">

      <button type="button" id="loginBtn" class="btn-app" style="width:100%">Sign In</button>
    </form>

    <p style="margin-top:12px;">Don't have an account? <a href="register.html">Register</a></p>
    <p style="margin-top:12px"><a href="index.html">Back to app home</a></p>
  </section>

  <script>
    document.getElementById('loginBtn').addEventListener('click', ()=>{
      const e=document.getElementById('email').value.trim();
      const p=document.getElementById('password').value.trim();
      const err=document.getElementById('loginError');
      if(!e||!p){ err.style.display='block'; err.textContent='Please fill all fields.'; return; }
      err.style.display='block'; err.textContent='Signing in (demo)...';
      setTimeout(()=>{ window.location.href='profile.html'; },800);
    });
  </script>
</main>
<footer>
  <div class="container"><div class="footer-bottom">&copy; 2026 TwinXCare</div></div>
</footer>
</body>
</html>
