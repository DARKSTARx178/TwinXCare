<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Equipment Management</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .admin-header {
            margin-top: 80px;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--primary-glow);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 40px;
        }

        .admin-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .section-heading {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .admin-input {
            background: #F1F5F9;
            border: none;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            outline: none;
            transition: var(--transition);
        }

        .admin-input:focus {
            box-shadow: 0 0 0 2px var(--primary);
        }

        .add-btn {
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .inventory-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: var(--transition);
        }

        .item-main {
            padding: 16px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .item-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--primary-glow);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            margin-right: 14px;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-weight: 800;
            font-size: 0.95rem;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .stock-display {
            text-align: center;
            padding: 0 12px;
            border-left: 1px solid var(--border);
        }

        .stock-num {
            font-weight: 900;
            font-size: 1.1rem;
        }

        .stock-label {
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .expanded-content {
            padding: 0 16px 16px;
            display: none;
        }

        .expanded-content.active {
            display: block;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 16px;
        }

        .manage-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .small-btn {
            flex: 1;
            padding: 10px;
            font-size: 0.8rem;
            min-width: 100px;
        }

        .back-btn {
            position: absolute;
            top: 25px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            text-decoration: none;
            font-size: 20px;
            transition: var(--transition);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <a href="./index.html" class="back-btn">
        <i class="mdi mdi-arrow-left"></i>
    </a>

    <main class="fade-in">
        <div class="admin-header">
            <div class="icon-circle">
                <i class="mdi mdi-tools"></i>
            </div>
            <h1>Equipment Inventory</h1>
            <p>Management & Stock Control Center</p>
        </div>

        <!-- Add New Section -->
        <div class="admin-section">
            <h2 class="section-heading">Add New Item</h2>
            <div class="form-row">
                <div class="input-wrapper">
                    <label class="input-label">Item Name</label>
                    <input type="text" id="add-name" class="admin-input" placeholder="e.g. Wheelchair">
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Brand</label>
                    <input type="text" id="add-brand" class="admin-input" placeholder="e.g. HealthCo">
                </div>
            </div>
            <div class="form-row">
                <div class="input-wrapper">
                    <label class="input-label">Price/Day ($)</label>
                    <input type="number" id="add-price" class="admin-input" placeholder="0.00">
                </div>
                <div class="input-wrapper">
                    <label class="input-label">Initial Stock</label>
                    <input type="number" id="add-stock" class="admin-input" placeholder="0">
                </div>
            </div>
            <div class="input-wrapper" style="margin-bottom: 16px;">
                <label class="input-label">Description</label>
                <textarea id="add-desc" class="admin-input" style="min-height: 80px; resize: vertical;"
                    placeholder="Detailed item description..."></textarea>
            </div>
            <div class="input-wrapper" style="margin-bottom: 20px;">
                <label class="input-label">Image (URL or file)</label>
                <input type="text" id="add-image" class="admin-input" placeholder="https://example.com/image.jpg" style="margin-bottom:8px;">
                <input type="file" id="add-image-file" accept="image/*" class="admin-input" style="padding:8px;">
                <div style="font-size:0.8rem; color:var(--text-dim); margin-top:6px;">Choose a file to upload or paste an image URL above.</div>
            </div>
            <button id="add-btn" class="btn">
                Register New Equipment
                <i class="mdi mdi-plus-circle-outline"></i>
            </button>
        </div>

        <div class="section-title">
            Current Inventory
        </div>
        <input type="text" id="search-input" class="search-bar" placeholder="Search items...">

        <div id="inventory-list">
            <!-- Inventory items populated here -->
        </div>
    </main>

    <script type="module">
    import { auth, onAuthStateChanged, db, doc, getDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, storage, ref, uploadBytes, getDownloadURL } from '/app/firebase.js';

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/app/login.html';
                return;
            }

            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    fetchEquipment();
                } else {
                    alert('Unauthorized access. Admin privileges required.');
                    window.location.href = '/app/index.html';
                }
            } catch (e) {
                console.error(e);
                window.location.href = '/app/index.html';
            }
        });

        async function fetchEquipment() {
            try {
                const snapshot = await getDocs(collection(db, 'equipment'));
                const list = document.getElementById('inventory-list');
                list.innerHTML = '';

                snapshot.forEach(docSnap => {
                    const item = docSnap.data();
                    const id = docSnap.id;

                    const el = document.createElement('div');
                    el.className = 'inventory-item';
                    el.innerHTML = `
                        <div class="item-main" onclick="this.nextElementSibling.classList.toggle('active')">
                            <div class="item-icon">
                                <i class="mdi mdi-cube-outline"></i>
                            </div>
                            <div class="item-details">
                                <div class="item-name">${item.name}</div>
                                <div class="item-meta">
                                    <span>${item.brand}</span>
                                    <span style="opacity: 0.3">•</span>
                                    <span style="color: var(--primary)">$${item.price}/day</span>
                                </div>
                            </div>
                            <div class="stock-display">
                                <div class="stock-num">${item.stock}</div>
                                <div class="stock-label">STOCK</div>
                            </div>
                            <i class="mdi mdi-chevron-down" style="margin-left: 10px; color: var(--text-dim)"></i>
                        </div>
                        <div class="expanded-content">
                            <div class="divider"></div>
                            <p style="font-size: 0.85rem; margin-bottom: 16px;">${item.description || 'No description provided.'}</p>
                            <div class="manage-actions">
                                <button class="btn small-btn" onclick="updateStock('${id}', ${item.stock + 1})">Add Stock</button>
                                <button class="btn small-btn" onclick="updateStock('${id}', ${Math.max(0, item.stock - 1)})">Remove</button>
                                <button class="btn small-btn" style="border-color: #ef4444; color: #ef4444;" onclick="deleteItem('${id}', '${item.name}')">Delete</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(el);
                });

                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                console.error(e);
            }
        }

        window.updateStock = async (id, newStock) => {
            try {
                await updateDoc(doc(db, 'equipment', id), { stock: newStock });
                fetchEquipment();
            } catch (e) {
                alert('Failed to update stock');
            }
        };

        window.deleteItem = async (id, name) => {
            if (!confirm(`Are you sure you want to delete "${name}"?`)) return;
            try {
                await deleteDoc(doc(db, 'equipment', id));
                fetchEquipment();
            } catch (e) {
                alert('Failed to delete item');
            }
        };

        document.getElementById('add-btn').addEventListener('click', async () => {
            const name = document.getElementById('add-name').value;
            const brand = document.getElementById('add-brand').value;
            const price = document.getElementById('add-price').value;
            const stock = document.getElementById('add-stock').value;
            const description = document.getElementById('add-desc').value;
            const imageUrl = document.getElementById('add-image').value.trim();
            const imageFileInput = document.getElementById('add-image-file');

            if (!name || !brand || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }

            try {
                document.getElementById('loader').style.display = 'flex';
                let image = imageUrl || '';

                // If a file was chosen, upload to Firebase Storage and get its download URL
                if (imageFileInput && imageFileInput.files && imageFileInput.files.length > 0) {
                    const file = imageFileInput.files[0];
                    const sRef = ref(storage, `equipment/${Date.now()}_${file.name}`);
                    const snap = await uploadBytes(sRef, file);
                    image = await getDownloadURL(snap.ref);
                }

                await addDoc(collection(db, 'equipment'), {
                    name, brand, price: Number(price), stock: Number(stock), description, image, createdAt: new Date()
                });
                alert('Equipment added!');
                location.reload();
            } catch (e) {
                console.error(e);
                alert('Failed to add equipment');
                document.getElementById('loader').style.display = 'none';
            }
        });

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.inventory-item');
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(term) ? 'block' : 'none';
            });
        });
    </script>
</body>

</html>
