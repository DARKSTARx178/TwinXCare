<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escort Availability</title>
    <meta name="description" content="Volunteer escort availability submission portal." />
    <style>
        /* Premium dark theme with glassmorphism */
        :root {
            --bg: #0a0a0a;
            --primary: hsl(210, 70%, 55%);
            --accent: hsl(210, 70%, 65%);
            --text: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --font: 'Inter', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #111 0%, #222 100%);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            margin-top: 2rem;
            width: 90%;
            max-width: 500px;
            backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: var(--primary);
        }

        label {
            display: block;
            margin-top: 1rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-top: 0.4rem;
            border: 1px solid var(--primary);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 0.95rem;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(100, 149, 237, 0.2);
        }

        .row {
            display: flex;
            gap: 0.8rem;
        }

        .row>div {
            flex: 1;
        }

        .btn {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.9rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Escort Availability</h1>
        <div id="loginContainer" style="margin-bottom:1.5rem;">
            <label for="loginEmail" style="font-weight:600;">Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com"
                style="width:100%;padding:0.5rem;margin-top:0.3rem;border:1px solid var(--primary);border-radius:6px;background:rgba(255,255,255,0.04);color:var(--text);" />
            <label for="loginPassword" style="font-weight:600;margin-top:0.8rem;">Password</label>
            <input type="password" id="loginPassword" placeholder="Password"
                style="width:100%;padding:0.5rem;margin-top:0.3rem;border:1px solid var(--primary);border-radius:6px;background:rgba(255,255,255,0.04);color:var(--text);" />
            <button type="button" id="loginBtn" class="btn" style="margin-top:0.8rem;">Login</button>
        </div>
        <form id="availabilityForm" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="font-size:1.2rem; color:var(--text); margin:0;">Post Availability</h2>
                <button type="button" id="logoutBtn"
                    style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:0.9rem; text-decoration:underline;">Logout</button>
            </div>
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required />

            <div class="row">
                <div>
                    <label for="fromTime">From</label>
                    <input type="time" id="fromTime" name="fromTime" required step="300" />
                </div>
                <div>
                    <label for="toTime">To</label>
                    <input type="time" id="toTime" name="toTime" required step="300" />
                </div>
            </div>

            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="Hospital / Area" required />

            <label for="maxPax">Max Pax</label>
            <input type="number" id="maxPax" name="maxPax" min="1" value="1" required />

            <label for="contactPhone">Contact Phone</label>
            <input type="tel" id="contactPhone" name="contactPhone" placeholder="Phone" required />

            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Any notes or constraints"></textarea>

            <button type="submit" class="btn" id="submitBtn">Submit Availability</button>
        </form>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="/secret/escortmgt.js"></script>
</body>

</html>
