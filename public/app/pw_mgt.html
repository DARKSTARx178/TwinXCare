<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Account Security</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .container {
            padding: 40px 20px 100px;
        }

        .back-button {
            position: absolute;
            top: 50px;
            left: 20px;
            z-index: 10;
            padding: 8px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.03);
            color: var(--text);
            text-decoration: none;
        }

        .header {
            margin-top: 100px;
            margin-bottom: 30px;
            text-align: center;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: var(--primary-glow);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px;
            font-size: 32px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .card {
            padding: 24px;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-heading {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text);
        }

        .input-wrapper {
            margin-bottom: 16px;
            text-align: left;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            display: block;
        }

        .input-container {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 0 16px;
            background: #F1F5F9;
        }

        .input-icon {
            margin-right: 10px;
            color: var(--text-dim);
            font-size: 20px;
        }

        .input {
            flex: 1;
            padding: 14px 0;
            font-size: 0.95rem;
            font-weight: 500;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: inherit;
        }

        .btn-load {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 2px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            gap: 8px;
        }

        .error-container {
            display: none;
            align-items: center;
            background: #fee2e2;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            color: #ef4444;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .success-container {
            display: none;
            align-items: center;
            background: #dcfce7;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            color: #10b981;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .user-list {
            background: #F8FAFC;
            border-radius: 20px;
            padding: 8px;
            max-height: 250px;
            overflow-y: auto;
        }

        .user-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 14px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .user-row.selected {
            border-color: var(--primary);
            background: var(--surface);
            color: var(--primary);
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            border: 2px solid;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="javascript:history.back()" class="back-button">
            <i class="mdi mdi-arrow-left" style="font-size: 24px;"></i>
        </a>

        <div class="header">
            <div class="icon-circle">
                <i class="mdi mdi-fingerprint"></i>
            </div>
            <div class="title">Account Security</div>
            <div class="subtitle">Administrative User & Password Management</div>
        </div>

        <div class="card">
            <div class="card-heading">Admin Authorization</div>
            <div class="input-wrapper">
                <label class="label">Admin Username</label>
                <div class="input-container">
                    <i class="mdi mdi-account-outline input-icon"></i>
                    <input type="text" id="admin-user" class="input" placeholder="Enter username">
                </div>
            </div>
            <div class="input-wrapper">
                <label class="label">Admin Password</label>
                <div class="input-container">
                    <i class="mdi mdi-lock-outline input-icon"></i>
                    <input type="password" id="admin-pass" class="input" placeholder="••••••••">
                </div>
            </div>
            <button class="btn-load" id="btn-load">Authorize & Load Users <i class="mdi mdi-sync"></i></button>

            <div id="error-box" class="error-container"></div>
            <div id="success-box" class="success-container"></div>
        </div>

        <div class="card" id="directory-card" style="display: none;">
            <div class="card-heading">User Directory</div>
            <div class="user-list" id="user-list"></div>

            <div id="management-section" style="display: none; margin-top: 20px;">
                <label class="label" id="manage-label">Modify Password</label>
                <div class="input-container" style="margin-top: 8px;">
                    <i class="mdi mdi-shield-outline input-icon"></i>
                    <input type="password" id="new-password" class="input" placeholder="Enter new password">
                </div>
                <div class="action-row">
                    <button class="action-btn"
                        style="border-color: var(--primary); color: var(--primary); background: transparent;"
                        id="btn-reset">Reset Password</button>
                    <button class="action-btn" style="border-color: #ef4444; color: #ef4444; background: transparent;"
                        id="btn-delete">Delete User</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        const serverUrl = 'http://172.22.129.135:8080';
        let selectedUser = '';

        const btnLoad = document.getElementById('btn-load');
        const directoryCard = document.getElementById('directory-card');
        const userList = document.getElementById('user-list');
        const managementSection = document.getElementById('management-section');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'flex';
            successBox.style.display = 'none';
        }

        function showSuccess(msg) {
            successBox.innerText = msg;
            successBox.style.display = 'flex';
            errorBox.style.display = 'none';
        }

        btnLoad.onclick = async () => {
            const username = document.getElementById('admin-user').value;
            const password = document.getElementById('admin-pass').value;

            if (!username || !password) return showError('Admin credentials required.');

            try {
                const res = await fetch(`${serverUrl}/api/getPasswords`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();
                if (res.ok) {
                    renderUsers(data.users);
                    directoryCard.style.display = 'block';
                    showSuccess('Users loaded successfully.');
                } else {
                    showError(data.error || 'Failed to fetch users.');
                }
            } catch (e) { showError('Server error.'); }
        };

        function renderUsers(users) {
            userList.innerHTML = users.map(u => `
        <div class="user-row" onclick="selectUser('${u}')" id="user-${u}">
          <i class="mdi mdi-account" style="margin-right: 12px;"></i>
          <span>${u}</span>
        </div>
      `).join('');
        }

        window.selectUser = (u) => {
            selectedUser = u;
            document.querySelectorAll('.user-row').forEach(r => r.classList.remove('selected'));
            document.getElementById(`user-${u}`).classList.add('selected');
            document.getElementById('manage-label').innerText = `Modify Password for @${u}`;
            managementSection.style.display = 'block';
        };

        document.getElementById('btn-reset').onclick = async () => {
            const newPassword = document.getElementById('new-password').value;
            const adminUsername = document.getElementById('admin-user').value;
            const adminPassword = document.getElementById('admin-pass').value;

            try {
                const res = await fetch(`${serverUrl}/api/resetPassword`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminUsername, adminPassword, targetUsername: selectedUser, newPassword }),
                });
                if (res.ok) {
                    showSuccess(`Password reset for ${selectedUser}`);
                    document.getElementById('new-password').value = '';
                } else showError('Failed to reset password.');
            } catch (e) { showError('Server error.'); }
        };

        document.getElementById('btn-delete').onclick = async () => {
            if (!confirm(`Delete user ${selectedUser}?`)) return;
            const adminUsername = document.getElementById('admin-user').value;
            const adminPassword = document.getElementById('admin-pass').value;

            try {
                const res = await fetch(`${serverUrl}/api/deleteUser`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminUsername, adminPassword, targetUsername: selectedUser }),
                });
                if (res.ok) {
                    showSuccess(`${selectedUser} deleted.`);
                    managementSection.style.display = 'none';
                    btnLoad.click(); // Reload users
                } else showError('Failed to delete user.');
            } catch (e) { showError('Server error.'); }
        };
    </script>
</body>

</html>
