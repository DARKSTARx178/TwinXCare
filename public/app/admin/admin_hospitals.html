<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Hospital Catalog</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <style>
        .header {
            margin-top: 40px;
            margin-bottom: 24px;
            text-align: center;
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 22px;
            background: var(--primary-glow);
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            margin-bottom: 14px;
        }

        .input,
        .textarea {
            width: 100%;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: #F1F5F9;
            color: var(--text);
            padding: 12px 14px;
            font-size: 0.92rem;
            font-weight: 600;
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
        }

        .textarea {
            resize: none;
            min-height: 68px;
        }

        .input:focus,
        .textarea:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            border: 2px solid var(--primary);
            background: var(--surface);
            color: var(--primary);
            font-size: 0.95rem;
            font-weight: 800;
            cursor: pointer;
        }

        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .list-item {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-top: 10px;
            background: var(--surface);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .tiny-btn {
            border-radius: 10px;
            border: 1.5px solid;
            padding: 8px 12px;
            font-size: 0.82rem;
            font-weight: 800;
            cursor: pointer;
            background: transparent;
        }

        .badge {
            border-radius: 999px;
            padding: 5px 11px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .badge.active {
            background: #ecfdf5;
            color: #047857;
        }

        .badge.inactive {
            background: #fef2f2;
            color: #b91c1c;
        }

        .meta {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 6px;
            font-weight: 500;
        }

        .link {
            color: var(--primary);
            font-size: 0.82rem;
            font-weight: 700;
            margin-top: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.05);
            padding: 8px;
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <main class="fade-in" style="padding-top: 18px; padding-bottom: 60px;">
        <a href="/app/admin/index.html" class="back-btn"><i class="mdi mdi-arrow-left" style="font-size: 24px;"></i></a>

        <div class="header">
            <div class="icon-circle"><i class="mdi mdi-hospital-building"></i></div>
            <div style="font-size: 1.6rem; font-weight: 900;">Hospital Catalog</div>
            <div style="margin-top: 4px; color: var(--text-dim); font-weight: 500;">Add, enable, disable, or remove hospitals used in the request form.</div>
        </div>

        <div class="card" style="margin-bottom: 16px;">
            <div style="font-size: 1.1rem; font-weight: 800; margin-bottom: 14px;">Add Hospital / Clinic</div>
            <input id="new-hospital-name" class="input" type="text" placeholder="Hospital name" style="margin-bottom:10px;">
            <textarea id="new-hospital-address" class="textarea" placeholder="Address or location (optional)" style="margin-bottom:10px;"></textarea>
            <button id="add-hospital-btn" class="btn">Add Hospital</button>
            <div id="hospital-helper" class="meta" style="margin-top: 10px;">This list is used in the patient escort request hospital dropdown.</div>
        </div>

        <div class="card">
            <div style="font-size: 1.1rem; font-weight: 800; margin-bottom: 14px;">Hospital Catalog List</div>
            <div id="hospital-list" style="color: var(--text-dim);">Loading hospitals...</div>
        </div>
    </main>

    <script type="module">
        import { auth, onAuthStateChanged, db, doc, getDoc, collection, getDocs, addDoc, updateDoc, deleteDoc, serverTimestamp } from '/app/firebase.js';

        const HOSPITAL_CATALOG_PATH = 'escort/hospitals/catalog';

        const loader = document.getElementById('loader');
        const addHospitalBtn = document.getElementById('add-hospital-btn');
        const hospitalListEl = document.getElementById('hospital-list');
        const newHospitalNameEl = document.getElementById('new-hospital-name');
        const newHospitalAddressEl = document.getElementById('new-hospital-address');

        let hospitals = [];

        function formatHospitalItem(item) {
            return {
                id: item.id,
                name: item.name || 'Unnamed hospital',
                address: item.address || '',
                active: item.active !== false,
            };
        }

        function renderHospitalList() {
            if (!hospitals.length) {
                hospitalListEl.innerHTML = 'No hospitals found.';
                return;
            }

            hospitalListEl.innerHTML = hospitals.map((item) => `
                <div class="list-item">
                    <div class="item-row">
                        <div style="flex: 1; min-width: 0;">
                            <div style="font-weight: 800; color: var(--text);">${item.name}</div>
                            ${item.address ? `<div class="meta">${item.address}</div>` : ''}
                            <div class="badge ${item.active ? 'active' : 'inactive'}">${item.active ? 'Active' : 'Inactive'}</div>
                        </div>
                        <div class="item-actions">
                            <button class="tiny-btn" style="border-color: var(--primary); color: var(--primary);" data-action="toggle" data-id="${item.id}">${item.active ? 'Disable' : 'Enable'}</button>
                            <button class="tiny-btn" style="border-color: #ef4444; color: #ef4444;" data-action="delete" data-id="${item.id}">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function loadHospitalCatalog() {
            try {
                const snap = await getDocs(collection(db, HOSPITAL_CATALOG_PATH));
                hospitals = snap.docs.map((d) => formatHospitalItem({ id: d.id, ...d.data() }));
                hospitals.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
                renderHospitalList();
            } catch (error) {
                console.error('Failed to load hospital catalog:', error);
                hospitalListEl.innerHTML = 'Unable to load hospital catalog.';
            } finally {
                loader.style.display = 'none';
            }
        }

        async function addHospital() {
            const name = newHospitalNameEl.value.trim();
            const address = newHospitalAddressEl.value.trim();
            if (!name) {
                alert('Please enter a hospital name.');
                return;
            }
            addHospitalBtn.disabled = true;
            try {
                await addDoc(collection(db, HOSPITAL_CATALOG_PATH), {
                    name,
                    address,
                    active: true,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                });
                newHospitalNameEl.value = '';
                newHospitalAddressEl.value = '';
                await loadHospitalCatalog();
            } catch (error) {
                console.error(error);
                alert('Unable to add hospital.');
            } finally {
                addHospitalBtn.disabled = false;
            }
        }

        hospitalListEl.addEventListener('click', async (event) => {
            const target = event.target.closest('button[data-action]');
            if (!target) return;
            const id = target.dataset.id;
            const action = target.dataset.action;
            if (!id || !action) return;

            if (action === 'toggle') {
                const item = hospitals.find((h) => h.id === id);
                if (!item) return;
                try {
                    await updateDoc(doc(db, HOSPITAL_CATALOG_PATH, id), {
                        active: !item.active,
                        updatedAt: serverTimestamp(),
                    });
                    await loadHospitalCatalog();
                } catch (error) {
                    console.error(error);
                    alert('Unable to update hospital status.');
                }
                return;
            }

            if (action === 'delete') {
                if (!confirm('Delete this hospital from the catalog?')) return;
                try {
                    await deleteDoc(doc(db, HOSPITAL_CATALOG_PATH, id));
                    await loadHospitalCatalog();
                } catch (error) {
                    console.error(error);
                    alert('Unable to delete hospital.');
                }
            }
        });

        addHospitalBtn.addEventListener('click', addHospital);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/app/login.html';
                return;
            }
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    await loadHospitalCatalog();
                } else {
                    alert('Unauthorized access. Admin privileges required.');
                    window.location.href = '/app/index.html';
                }
            } catch (e) {
                console.error(e);
                window.location.href = '/app/index.html';
            }
        });
    </script>
</body>

</html>
