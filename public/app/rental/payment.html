<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TwinXCare - Payment</title>
    <link rel="stylesheet" href="/app/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css">
    <meta name="theme-color" content="#F8FAFC">
    <style>
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: var(--primary-glow);
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
        }

        .card {
            padding: 24px;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .card-heading {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 15px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-container {
            display: flex;
            align-items: flex-start;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            background: #F1F5F9;
        }

        .input {
            flex: 1;
            font-size: 0.95rem;
            border: none;
            background: transparent;
            outline: none;
            color: var(--text);
            min-height: 60px;
            resize: none;
            font-family: inherit;
        }

        .confirm-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            background: var(--surface);
            color: var(--primary);
            border: 2px solid var(--primary);
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .confirm-btn:hover {
            background: var(--primary);
            color: white;
        }

        .security-seal {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>

<body>

    <main class="fade-in"
        style="padding-top: 60px; padding-bottom: 40px; min-height: 100vh; display: flex; flex-direction: column;">
        <a href="javascript:history.back()"
            style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 12px; color: var(--text); text-decoration: none;">
            <i class="mdi mdi-arrow-left" style="font-size: 24px;"></i>
        </a>

        <div class="header">
            <div class="icon-circle">
                <i class="mdi mdi-cash"></i>
            </div>
            <div style="font-weight: 800; font-size: 1.5rem;" id="page-title">Payment Details</div>
            <div style="color: var(--text-dim); font-weight: 500; margin-top: 4px;" id="page-subtitle">Finalize booking
            </div>
        </div>

        <div class="card">
            <div class="card-heading">Order Summary</div>

            <div class="summary-row">
                <div style="color: var(--text-dim); font-weight: 500;">Item</div>
                <div style="font-weight: 700;" id="sum-name">Loading...</div>
            </div>
            <div class="summary-row">
                <div style="color: var(--text-dim); font-weight: 500;">Quantity</div>
                <div style="font-weight: 700;" id="sum-qty">1</div>
            </div>
            <div class="summary-row" id="row-duration">
                <div style="color: var(--text-dim); font-weight: 500;">Duration</div>
                <div style="font-weight: 700;" id="sum-dur">1 Day</div>
            </div>

            <div class="divider"></div>

            <div class="total-row">
                <div style="font-weight: 800; font-size: 1.1rem;">Total Amount</div>
                <div style="font-weight: 900; font-size: 1.5rem; color: var(--primary);" id="sum-total">$0.00</div>
            </div>
        </div>

        <div class="card" id="delivery-section" style="display: none;">
            <div class="card-heading">Delivery Information</div>
            <div
                style="font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px;">
                Address</div>
            <div class="input-container">
                <i class="mdi mdi-map-marker-outline"
                    style="color: var(--text-dim); margin-right: 10px; margin-top: 2px;"></i>
                <textarea class="input" id="address-input" placeholder="1234 Main St, City, Country"></textarea>
            </div>
        </div>

        <button class="confirm-btn" id="btn-confirm">
            Complete Transaction <i class="mdi mdi-shield-check"></i>
        </button>

        <div class="security-seal">
            <i class="mdi mdi-lock-outline"></i> Secure SSL Encrypted Payment (Mock)
        </div>
    </main>

    <script type="module">
        import { auth, db, doc, getDoc, collection, updateDoc } from '/app/firebase.js';
        import { arrayUnion, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'equipment'; // equipment or service

        // Extracted params
        const docId = urlParams.get('docId');
        const name = urlParams.get('name');
        const price = Number(urlParams.get('price')) || 0;

        let qty = 1;
        let days = 1;
        let totalPrice = price;

        if (type === 'equipment') {
            qty = Number(urlParams.get('quantity')) || 1;
            days = Number(urlParams.get('rentalDays')) || 1;
            totalPrice = price * qty * days;
            document.getElementById('delivery-section').style.display = 'block';
        } else {
            document.getElementById('row-duration').style.display = 'none';
            totalPrice = price; // fixed price for service
        }

        document.getElementById('page-subtitle').innerText = `Finalize your ${type} booking`;
        document.getElementById('sum-name').innerText = name;
        document.getElementById('sum-qty').innerText = qty;
        document.getElementById('sum-dur').innerText = `${days} Day${days > 1 ? 's' : ''}`;
        document.getElementById('sum-total').innerText = `$${totalPrice.toFixed(2)}`;

        document.getElementById('btn-confirm').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) {
                alert("Please login to complete the transaction.");
                window.location.href = '/app/index.html';
                return;
            }

            const btn = document.getElementById('btn-confirm');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // Set a 20 second timeout for the entire transaction
                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Transaction processing timeout')), 20000)
                );

                const transactionPromise = (async () => {
                    const userRef = doc(db, 'users', user.uid);

                    if (type === 'equipment') {
                        const address = document.getElementById('address-input').value.trim();
                        if (!address) {
                            throw new Error('Please enter a delivery address.');
                        }

                        // Update stock
                        const prodRef = doc(db, 'equipment', docId);
                        const prodSnap = await getDoc(prodRef);
                        if (prodSnap.exists()) {
                            const currentStock = prodSnap.data().stock || 0;
                            if (currentStock >= qty) {
                                await updateDoc(prodRef, { stock: currentStock - qty });
                            }
                        }

                        // Build order data
                        const transactionId = `${docId.substring(0, 3).toUpperCase()}-${Math.random().toString(36).substr(2, 3).toUpperCase()}`;
                        const orderData = {
                            productId: docId,
                            name: name,
                            quantity: qty,
                            rentalDays: days,
                            rentalStart: urlParams.get('rentalStart'),
                            rentalEnd: urlParams.get('rentalEnd'),
                            totalPrice: totalPrice.toFixed(2),
                            deliveryAddress: address,
                            orderTime: new Date().toISOString(),
                            transactionId: transactionId,
                            status: 'Processing',
                            createdAt: new Date().toISOString()
                        };

                        // Save to user history
                        await setDoc(userRef, { history: arrayUnion(orderData) }, { merge: true });

                    } else if (type === 'service') {
                        // Update Schedule Pax
                        const srvRef = doc(db, 'services', docId);
                        const srvSnap = await getDoc(srvRef);
                        if (srvSnap.exists()) {
                            const data = srvSnap.data();
                            const sched = data.schedule || [];
                            const updatedSched = sched.map(s => {
                                if (s.date === urlParams.get('bookingDate') && `${s.from} - ${s.to}` === urlParams.get('timeSlot')) {
                                    return { ...s, pax: Math.max((s.pax || 1) - 1, 0) };
                                }
                                return s;
                            });
                            await updateDoc(srvRef, { schedule: updatedSched });
                        }

                        // Build booking data
                        const bookingData = {
                            serviceId: docId,
                            title: name,
                            description: urlParams.get('notes') || '',
                            bookingDate: urlParams.get('bookingDate'),
                            timeSlot: urlParams.get('timeSlot'),
                            price: price,
                            createdAt: new Date().toISOString()
                        };

                        // Save to user bookings
                        await setDoc(userRef, { booking: arrayUnion(bookingData) }, { merge: true });
                    }
                })();

                await Promise.race([transactionPromise, timeoutPromise]);

                // Redirect to Delivery/History page upon success
                btn.innerText = "Success! Redirecting...";
                setTimeout(() => {
                    // Try primary redirect
                    window.location.href = '/app/delivery.html';
                    
                    // Fallback redirect after a delay if needed
                    setTimeout(() => {
                        if (window.location.pathname !== '/app/delivery.html') {
                            window.location.replace('/app/delivery.html');
                        }
                    }, 1000);
                }, 500);

            } catch (err) {
                console.error('Transaction error:', err);
                const errorMsg = err.message.includes('timeout')
                    ? 'Transaction is taking too long. Please check your connection and try again.'
                    : err.message;
                alert("Failed to process transaction: " + errorMsg);
                btn.innerHTML = `Complete Transaction <i class="mdi mdi-shield-check"></i>`;
                btn.disabled = false;
            }
        });

    </script>
</body>

</html>
